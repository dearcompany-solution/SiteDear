  });
}

async function saveToSupabase(idx){
  const f = uploadedFiles[idx];
  if(!f || !f.parsed || !f.parsed.length){
    toast('вҡ пёҸ лЁјм Җ нҢҢмӢұмқ„ мҷ„лЈҢн•ҙмЈјм„ёмҡ”');
    return;
  }

  toast(`рҹ”Қ [${f.month}] мӨ‘ліө лҚ°мқҙн„° нҷ•мқё л°Ҹ м ҖмһҘ мӨ‘...`);

  try {
    const headers = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    };

    // 1пёҸвғЈ нҳ„мһ¬ DBм—җ м ҖмһҘлҗң н•ҙлӢ№ мӣ”мқҳ лҚ°мқҙн„° лӘ©лЎқмқ„ к°Җм ёмҳҙ (мӨ‘ліө мІҙнҒ¬мҡ©)
    const checkRes = await fetch(
      `${SUPABASE_URL}/rest/v1/daily_reports?client_key=eq.${f.client}&month=eq.${f.month}&select=date,campaign_type,device`,
      { headers }
    );
    const existingData = await checkRes.json();

    // 2пёҸвғЈ мӨ‘ліө лҚ°мқҙн„° н•„н„°л§Ғ н•ЁмҲҳ
    // лӮ м§ң + мә нҺҳмқё + кё°кё° мЎ°н•©мқҙ DBм—җ м—ҶлҠ” кІғл§Ң кіЁлқјлғ„
    const isNew = (item) => !existingData.some(old => 
      old.date === item.date && 
      old.campaign_type === item.campaign_type && 
      old.device === item.device
    );

    const dailyNew = f.parsed.filter(r => r.data_type === 'daily' && isNew(r));
    const keywordNew = f.parsed.filter(r => r.data_type === 'keyword'); // нӮӨмӣҢл“ңлҠ” нҶөмғҒ м „мІҙ көҗмІҙ к¶ҢмһҘ
    const hourlyNew = f.parsed.filter(r => r.data_type === 'hourly');

    // 3пёҸвғЈ мғҲлЎңмҡҙ лҚ°мқҙн„°к°Җ мһҲмқ„ л•Ңл§Ң м ҖмһҘ м§„н–ү
    if(dailyNew.length > 0){
      const res = await fetch(`${SUPABASE_URL}/rest/v1/daily_reports`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify(dailyNew)
      });
      if(!res.ok) throw new Error('лҚ°мқҙн„° м ҖмһҘ мӨ‘ мҳӨлҘҳ л°ңмғқ');
      
      toast(`вң… мғҲ лҚ°мқҙн„° ${dailyNew.length}кұҙ м¶”к°Җ мҷ„лЈҢ!`);
    } else {
      toast('в„№пёҸ м¶”к°Җн•  мғҲлЎңмҡҙ лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ.');
    }

    // 4пёҸвғЈ мғҒнғң м—…лҚ°мқҙнҠё
    uploadedFiles[idx].status = 'м ҖмһҘмҷ„лЈҢ';
    renderContent('input');
    setTimeout(renderUploadTab, 50);

  } catch(err) {
    console.error(err);
    toast('вқҢ м ҖмһҘ мӢӨнҢЁ: ' + err.message);
  }
}

function previewFile(idx){
  const f = uploadedFiles[idx];
  if(!f||!f.file) return;
  const ext = f.name.split('.').pop().toLowerCase();

  if(ext==='csv'){
    // CSV вҖ” лӘЁлӢ¬лЎң лӮҙмҡ© лҜёлҰ¬ліҙкё°
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      const lines = text.split('\n').slice(0,51); // н—ӨлҚ”+50н–ү
      const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
      const rows = lines.slice(1).filter(l=>l.trim());
      const tableRows = rows.map(line=>{
        const cols = line.split(',').map(c=>c.replace(/^"|"$/g,'').trim());
        return `<tr>${cols.map(c=>`<td style="font-size:11px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;padding:6px 10px;border-bottom:1px solid var(--border)">${c}</td>`).join('')}</tr>`;
      }).join('');
      const headerHtml = headers.map(h=>`<th style="font-size:10.5px;padding:7px 10px;background:var(--surface);white-space:nowrap">${h}</th>`).join('');

      document.getElementById('modalTitle').textContent = `рҹ“„ ${f.name}`;
      document.getElementById('modalBody').innerHTML = `
        <div style="font-size:12px;color:var(--text3);margin-bottom:10px">${rows.length}н–ү н‘ңмӢң мӨ‘ (мөңлҢҖ 50н–ү)</div>
        <div style="overflow:auto;max-height:420px;border:1px solid var(--border);border-radius:var(--rsm)">
          <table style="border-collapse:collapse;width:100%">
            <thead style="position:sticky;top:0"><tr>${headerHtml}</tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>`;
      document.getElementById('modalFooter').innerHTML = `
        <button class="btn btn-ol" onclick="closeModal()">лӢ«кё°</button>
        <button class="btn btn-bl" onclick="downloadFileObj(${idx})">в¬Ү лӢӨмҡҙлЎңл“ң</button>`;
      document.getElementById('modalOverlay').classList.add('open');
    };
    reader.readAsText(f.file, 'UTF-8');

  } else {
    // XLSX вҖ” мғҲ нғӯм—җм„ң м—ҙкё° (лӢӨмҡҙлЎңл“ң)
    downloadFileObj(idx);
  }
}

async function loadMessages(clientKey){
  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/messages?client_key=eq.${clientKey}&order=created_at.asc&limit=100`,
      {headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}}
    );
    const rows = await res.json();
    if(!Array.isArray(rows)) return;
    renderMessages(rows);

    // мқҪмқҢ мІҳлҰ¬ (мғҒлҢҖл°© л©”мӢңм§Җ)
    const unreadIds = rows
      .filter(r=>r.sender_role!==currentUser.role && !r.is_read)
      .map(r=>r.id);
    if(unreadIds.length>0){
      await fetch(
        `${SUPABASE_URL}/rest/v1/messages?id=in.(${unreadIds.join(',')})`,
        {method:'PATCH',
         headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY},
         body:JSON.stringify({is_read:true})}
      );
    }
  }catch(e){console.warn('л©”мӢңм§Җ лЎңл“ң мӢӨнҢЁ:',e);}
}

/* в”Җв”Җ л©”мӢңм§Җ л ҢлҚ” в”Җв”Җ */
function renderMessages(rows){
  const chat = document.getElementById('chatArea');
  if(!chat) return;

  if(!rows.length){
    chat.innerHTML=`<div style="text-align:center;padding:30px;color:var(--text3)">
      <div style="font-size:24px;margin-bottom:8px">рҹ’¬</div>
      <p style="font-size:13px">м•„м§Ғ лҢҖнҷ” лӮҙмҡ©мқҙ м—ҶмҠөлӢҲлӢӨ.<br>мІ« л©”мӢңм§ҖлҘј ліҙлӮҙліҙм„ёмҡ”!</p>
    </div>`;
    return;
  }

  chat.innerHTML = rows.map(r=>{
    const isMine = r.sender_id === currentUser.id;
    const time = new Date(r.created_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    const initials = r.sender_name?.charAt(0) || '?';
    return `<div class="brow ${isMine?'mine':''}">
      <div class="bav ${isMine?'bav-c':'bav-m'}">${initials}</div>

        ${!isMine?`<div style="font-size:11px;color:var(--text3);margin-bottom:3px">${r.sender_name}</div>`:''}
        <div class="bubble ${isMine?'cli':'mgr'}">${r.content}</div>
        <div class="bmeta">${time}</div>
      </div>
    </div>`;
  }).join('');

  // л§Ё м•„лһҳлЎң мҠӨнҒ¬лЎӨ
  chat.scrollTop = chat.scrollHeight;
}

/* в”Җв”Җ Realtime кө¬лҸ… мӢңмһ‘ в”Җв”Җ */
function subscribeMessages(clientKey){
  // кё°мЎҙ мұ„л„җ н•ҙм ң
  if(msgChannel){
    try{ msgChannel.unsubscribe(); }catch(e){}
    msgChannel = null;
  }

  // Supabase Realtime WebSocket м—°кІ°
  const wsUrl = SUPABASE_URL.replace('https://','wss://') + '/realtime/v1/websocket?apikey=' + SUPABASE_ANON_KEY + '&vsn=1.0.0';

  try{
    const ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      // мұ„л„җ join
      ws.send(JSON.stringify({
        topic: `realtime:public:messages:client_key=eq.${clientKey}`,
        event: 'phx_join',
        payload: {config:{broadcast:{self:false},presence:{key:''},postgres_changes:[{event:'INSERT',schema:'public',table:'messages',filter:`client_key=eq.${clientKey}`}]}},
        ref: '1'
      }));
      console.log('вң… Realtime м—°кІ°лҗЁ');
    };
    ws.onmessage = (e) => {
      try{
        const msg = JSON.parse(e.data);
        if(msg.event === 'postgres_changes' || (msg.payload?.data?.type === 'INSERT')){
          const newRow = msg.payload?.data?.record || msg.payload?.record;
          if(newRow && newRow.sender_id !== currentUser.id){
            // мғҒлҢҖл°© л©”мӢңм§Җ мӢӨмӢңк°„ м¶”к°Җ
            const chat = document.getElementById('chatArea');
            if(chat){
              const time = new Date(newRow.created_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
              const initials = newRow.sender_name?.charAt(0)||'?';
              chat.insertAdjacentHTML('beforeend',`
                <div class="brow">
                  <div class="bav bav-m">${initials}</div>
                  <div>
                    <div style="font-size:11px;color:var(--text3);margin-bottom:3px">${newRow.sender_name}</div>
                    <div class="bubble mgr">${newRow.content}</div>
                    <div class="bmeta">${time}</div>
                  </div>
                </div>`);
              chat.scrollTop = chat.scrollHeight;
              // м•ҢлҰјмқҢ нҡЁкіј
              toast('рҹ’¬ мғҲ л©”мӢңм§Җ: '+newRow.sender_name);
            }
          }
        }
      }catch(err){}
    };
    ws.onerror = ()=>{ console.warn('Realtime м—°кІ° мӢӨнҢЁ вҖ” нҸҙл§ҒмңјлЎң м „нҷҳ'); startPolling(clientKey); };
    ws.onclose = ()=>{ console.log('Realtime м—°кІ° мў…лЈҢ'); };
    msgChannel = ws;
  }catch(e){
    startPolling(clientKey);
  }
}

/* в”Җв”Җ Realtime мӢӨнҢЁ мӢң нҸҙл§Ғ fallback (5мҙҲл§ҲлӢӨ) в”Җв”Җ */
let pollingTimer = null;
function startPolling(clientKey){
  if(pollingTimer) clearInterval(pollingTimer);
  pollingTimer = setInterval(()=>{
    if(document.getElementById('chatArea')) loadMessages(clientKey);
    else { clearInterval(pollingTimer); pollingTimer=null; }
  }, 5000);
}
function stopPolling(){ if(pollingTimer){clearInterval(pollingTimer);pollingTimer=null;} }

async function sendMsg(){
  const inp = document.getElementById('msgInput');
  const txt = inp.value.trim();
  if(!txt) return;

  // мұ„нҢ… лҢҖмғҒ кІ°м •

    ? (currentChatClient || activeClientId || '')
    : currentUser.id;

  if(!clientKey){ toast('вҡ пёҸ мұ„нҢ…н•  нҒҙлқјмқҙм–ёнҠёлҘј лЁјм Җ м„ нғқн•ҙмЈјм„ёмҡ”'); return; }

  inp.value = '';

  // лӮҷкҙҖм Ғ UI м—…лҚ°мқҙнҠё (мҰүмӢң н‘ңмӢң)
  const chat = document.getElementById('chatArea');
  const now = new Date();
  const time = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const initials = (currentUser.name||currentUser.id).charAt(0);
  if(chat){
    // л№Ҳ нҷ”л©ҙ л©”мӢңм§Җ м ңкұ°
    const emptyEl = chat.querySelector('div[style*="text-align:center"]');
    if(emptyEl) emptyEl.remove();

    chat.insertAdjacentHTML('beforeend',`
      <div class="brow mine">
        <div class="bav bav-c">${initials}</div>
        <div>
          <div class="bubble cli">${txt}</div>
          <div class="bmeta">${time}</div>
        </div>
      </div>`);
    chat.scrollTop = chat.scrollHeight;
  }

  // Supabase м ҖмһҘ
  await saveMessage(clientKey, txt);
}

function renderCal(){
  const months=['1мӣ”','2мӣ”','3мӣ”','4мӣ”','5мӣ”','6мӣ”','7мӣ”','8мӣ”','9мӣ”','10мӣ”','11мӣ”','12мӣ”'];
  document.getElementById('calMonthLabel').textContent=`${calYear}л…„ ${months[calMonth]}`;
  const grid=document.getElementById('calGrid');
  if(!grid)return;
  const dows=['мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ ','мқј'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1);
  let startDay=first.getDay()-1;if(startDay<0)startDay=6;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=new Date();
  const typeColor={meet:'var(--blue)',report:'var(--naver)',notice:'var(--gold)',task:'var(--indigo)'};
  const evMap={};
  calEvents.forEach(e=>{
    const[y,m,d]=e.date.split('-').map(Number);
    if(y===calYear&&m===calMonth+1){if(!evMap[d])evMap[d]=[];evMap[d].push(e.type);}
  });
  for(let i=startDay-1;i>=0;i--)html+=`<div class="cal-day other-month" style="pointer-events:none"><span>${prevDays-i}</span></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const dots=evMap[d]?evMap[d].map(t=>`<div class="ev-day-dot" style="background:${typeColor[t]||'var(--store)'}"></div>`).join(''):'';
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html+=`<div class="cal-day ${isToday?'today':''} ${evMap[d]?'has-event':''}" onclick="selectCalDay('${dateStr}',${d})">
      <span>${d}</span><div class="ev-dots">${dots}</div>
    </div>`;
  }
  const total=startDay+daysInMonth;
  const remain=total%7===0?0:7-(total%7);
  for(let i=1;i<=remain;i++)html+=`<div class="cal-day other-month" style="pointer-events:none"><span>${i}</span></div>`;
  grid.innerHTML=html;
  renderEvList(null);
}

async function addEvent(){
  const dateStart = document.getElementById('ef-date-start').value;
  const dateEnd   = document.getElementById('ef-date-end').value || dateStart;
  const title     = document.getElementById('ef-title').value.trim();
  if(!dateStart||!title){toast('вҡ пёҸ мӢңмһ‘мқјкіј м ңлӘ©мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”');return;}
  if(dateEnd < dateStart){toast('вҡ пёҸ мў…лЈҢмқјмқҙ мӢңмһ‘мқјліҙлӢӨ л№ лҘј мҲҳ м—ҶмҠөлӢҲлӢӨ');return;}
  let cur = new Date(dateStart);
  const end = new Date(dateEnd);
  while(cur <= end){
    const dateStr = cur.toISOString().slice(0,10);
    const newEv = {
      id: Date.now()+Math.random(), date: dateStr, date_end: dateEnd,
      type:    document.getElementById('ef-type').value,
      title,
      desc:    document.getElementById('ef-desc').value,
      manager: document.getElementById('ef-mgr').value
    };
    calEvents.push(newEv);
    await saveEventToSupabase(newEv);
    cur.setDate(cur.getDate()+1);
  }

}

async function updateReqStatus(id,status){

function renderAdminTable(){
  const q = adminSearch.trim().toLowerCase();
  let list = ACCOUNTS.filter(a=>a.role==='client');
  if(q) list = list.filter(a=>
    a.company.toLowerCase().includes(q) ||

    (a.url||'').toLowerCase().includes(q) ||

    (a.naver_gfa_id||'').toLowerCase().includes(q)

  if(adminTeamFilter!=='м „мІҙ') list = list.filter(a=>a.manager===adminTeamFilter);

  const total = list.length;
  const totalPages = Math.max(1, Math.ceil(total/adminPageSize));
  if(adminPage>totalPages) adminPage=totalPages;
  const paged = list.slice((adminPage-1)*adminPageSize, adminPage*adminPageSize);

  const wrap = document.getElementById('adminTableWrap');

  if(!paged.length){
    wrap.innerHTML=`<div class="empty"><div class="ei">рҹ”Қ</div><p>${total===0?'л“ұлЎқлҗң м—…мІҙк°Җ м—ҶмҠөлӢҲлӢӨ':'кІҖмғү кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ'}</p></div>`;

  let html='';

    html+=`<div style="font-size:12px;font-weight:700;color:var(--blue);padding:10px 4px 4px;margin-top:8px">рҹ‘Ө ${team} нҢҖ (${groups[team].length}к°ң)</div>`;

        <td><b>${c.company}</b></td>
        <td style="font-size:11.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${c.id}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;">
          ${c.naver_search_id
            ? `<span style="color:var(--naver);font-weight:600">${c.naver_search_id}</span>`
            : `<span style="color:var(--red);font-size:11px">вҡ пёҸ лҜёл“ұлЎқ</span>`}
        </td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;">
          ${c.naver_gfa_id
            ? (sameId ? `<span style="color:var(--text3);font-size:11px">кІҖмғүкҙ‘кі мҷҖ лҸҷмқј</span>` : `<span style="color:var(--blue);font-weight:600">${c.naver_gfa_id}</span>`)
            : `<span style="color:var(--text3);font-size:11px">вҖ”</span>`}

        <td style="font-size:12px;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.memo||'вҖ”'}</td>
        <td><div style="display:flex;align-items:center;gap:4px"><div class="sdot"></div><span style="font-size:11px">мҡҙмҳҒмӨ‘</span></div></td>
        <td><div class="act-btns">
          <button class="btn btn-ol btn-sm" onclick="event.stopPropagation();openEditClient('${c.id}')">вңҸпёҸ</button>

        </div></td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  });
  wrap.innerHTML=html;

  // нҺҳмқҙм§Җл„Өмқҙм…ҳ
  const pager=document.getElementById('adminPager');
  if(totalPages<=1){pager.innerHTML='';return;}
  let pgHtml=`<span>мҙқ ${total}к°ң м—…мІҙ В· ${adminPage}/${totalPages} нҺҳмқҙм§Җ</span><div class="pg-btns">`;

    pgHtml+=`<button class="pg-btn ${i===adminPage?'active':''}" onclick="adminPage=${i};renderAdminTable()">${i}</button>`;
  }
  pgHtml+=`<button class="pg-btn" onclick="adminPage++;renderAdminTable()" ${adminPage===totalPages?'disabled':''}>вҖә</button>`;
  pgHtml+=`<button class="pg-btn" onclick="adminPage=${totalPages};renderAdminTable()" ${adminPage===totalPages?'disabled':''}>В»</button>`;
  pgHtml+=`</div>`;
  pager.innerHTML=pgHtml;

function downloadClientList(){
  const list = ACCOUNTS.filter(a=>a.role==='client');
  if(!list.length){ toast('вҡ пёҸ лӢӨмҡҙлЎңл“ңн•  м—…мІҙк°Җ м—ҶмҠөлӢҲлӢӨ'); return; }

}

async function saveEditClient(id){
  const c = ACCOUNTS.find(a => a.id === id);
  if(!c) return;

  const name     = document.getElementById('ec-name').value.trim();
  const newId    = document.getElementById('ec-id').value.trim();
  const pw       = document.getElementById('ec-pw').value;
  const mgr      = document.getElementById('ec-mgr').value;
  const url      = document.getElementById('ec-url').value.trim();
  const memo     = document.getElementById('ec-memo').value.trim();
  const searchId = document.getElementById('ec-search-id')?.value.trim()||'';
  const gfaSame  = document.getElementById('ec-gfa-same')?.checked;
  const gfaId    = gfaSame ? searchId : (document.getElementById('ec-gfa-id')?.value.trim()||'');

  if(!name)  { toast('вҡ пёҸ м—…мІҙлӘ…мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”'); return; }
 if(currentUser.role==='admin' && newId !== id && ACCOUNTS.find(a=>a.id===newId)){
    toast('вҡ пёҸ мқҙлҜё мӮ¬мҡ© мӨ‘мқё м•„мқҙл””мһ…лӢҲлӢӨ'); return;
  }

  toast('рҹ’ҫ м ҖмһҘ мӨ‘...');

  try {
    const updateData = { company_name: name, manager: mgr, store_url: url, memo, naver_search_id: searchId||null, naver_gfa_id: gfaId||null };
    if(currentUser.role==='admin' && newId && newId !== id) updateData.client_key = newId;
    if(pw) updateData.password = pw;

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/clients?client_key=eq.${encodeURIComponent(id)}`,
      {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(updateData)
      }
    );

    if(!res.ok) {
      const err = await res.text();
      console.error('DB м—җлҹ¬:', err);
      throw new Error(err);
    }

    if(currentUser.role==='admin' && newId && newId !== id){
      c.id = newId;
      if(activeClientId === id) activeClientId = newId;
    }
    c.company         = name;
    c.name            = name;
    c.manager         = mgr;
    c.url             = url;
    c.memo            = memo;
    c.naver_search_id = searchId;
    c.naver_gfa_id    = gfaId;
    if(pw) c.pw = pw;

    closeModal();
    toast(`вң… [${name}] м ҖмһҘ мҷ„лЈҢ`);
    if(typeof renderAdminTable === 'function') renderAdminTable();

  } catch(err) {
    console.error('м ҖмһҘ мӢӨнҢЁ:', err);
    toast('вқҢ м ҖмһҘ мӢӨнҢЁ: ' + err.message);
  }
}

async function deleteClient(id){
  const idx=ACCOUNTS.findIndex(a=>a.id===id);
  if(idx===-1)return;
  const name=ACCOUNTS[idx].company;

  try{
    // Supabase мӮӯм ң
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/clients?client_key=eq.${id}`,
      {method:'DELETE',
       headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}}
    );
    if(!res.ok)throw new Error(await res.text());

    // лЎңм»¬ ACCOUNTSлҸ„ лҸҷкё°нҷ”
    ACCOUNTS.splice(idx,1);
    if(activeClientId===id)activeClientId=null;

    closeModal();
    toast(`рҹ—‘ ${name} кі„м •мқҙ мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ`);
    renderContent('admin');
  }catch(err){
    toast('вқҢ мӮӯм ң мӢӨнҢЁ: '+err.message);
  }
}

      console.error('Supabase м ҖмһҘ мӢӨнҢЁ:', errText);
      toast('вқҢ м ҖмһҘ мӢӨнҢЁ: ' + errText);
      return;
    }

    // DB м ҖмһҘ м„ұкіө нӣ„ лЎңм»¬м—җлҸ„ м¶”к°Җ
    ACCOUNTS.push({id, pw, role:'client', name, company:name, manager:mgr, url, memo, naver_search_id:searchId, naver_gfa_id:gfaId});
    toast(`вң… ${name} л“ұлЎқ мҷ„лЈҢ!`);
    clearReg();
    renderContent('register');

  }catch(e){
    console.error('л“ұлЎқ мҳӨлҘҳ:', e);
    toast('вқҢ л„ӨнҠёмӣҢнҒ¬ мҳӨлҘҳ: ' + e.message);
  }
}

let bulkData = [];
function previewBulkExcel(file){
  if(!file) return;
  loadSheetJS(()=>{
    const reader = new FileReader();
    reader.onload = e => {
      try{
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

        // н—ӨлҚ” н–ү кұҙл„Ҳлӣ°кі  лҚ°мқҙн„°л§Ң м¶”м¶ң
        const dataRows = rows
  .slice(1) // н—ӨлҚ” 1н–ү кұҙл„ҲлңҖ
  .filter(r => r[0] && r[1] && r[2]) // м—…мІҙлӘ…В·м•„мқҙл””В·л№„лІҲ н•„мҲҳ
  .filter(r => String(r[1]).trim() !== 'example-id'); // мҳҲмӢң н–ү мһҗлҸҷ м ңмҷё // м—…мІҙлӘ…В·м•„мқҙл””В·л№„лІҲ н•„мҲҳ
        if(!dataRows.length){
          document.getElementById('bulkPreview').innerHTML =
            `<div style="color:var(--red);font-size:12.5px;padding:10px">вҡ пёҸ мң нҡЁн•ң лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ. м—…мІҙлӘ…В·м•„мқҙл””В·л№„л°ҖлІҲнҳёлҠ” н•„мҲҳмһ…лӢҲлӢӨ.</div>`;
          return;
        }

        // мӨ‘ліө мІҙнҒ¬ вҖ” м•„мқҙл”” / м—…мІҙлӘ… / кІҖмғүкҙ‘кі ID / GFA ID (DB + м—‘м…Җ лӮҙл¶Җ)
        const clients = ACCOUNTS.filter(a=>a.role==='client');
        const seenIds      = new Set();
        const seenNames    = new Set();
        const seenSearchIds = new Set();
        const seenGfaIds   = new Set();

        bulkData = dataRows.map(r=>({
          company:   String(r[0]||'').trim(),
          id:        String(r[1]||'').trim(),
          pw:        String(r[2]||'').trim(),
          manager:   String(r[3]||'').trim(),
          url:       String(r[4]||'').trim(),
          memo:      String(r[5]||'').trim(),
          search_id: String(r[6]||'').trim(),
          gfa_id:    String(r[7]||'').trim() || String(r[6]||'').trim(),
          dup:       false,
          dup_reason: ''
        })).filter(r=>r.company&&r.id&&r.pw).map(r=>{
          // DB мӨ‘ліө мІҙнҒ¬
          if(clients.find(a=>a.id===r.id)){
            r.dup=true; r.dup_reason='м•„мқҙл”” мӨ‘ліө'; return r;
          }
          if(clients.find(a=>a.company===r.company)){
            r.dup=true; r.dup_reason='м—…мІҙлӘ… мӨ‘ліө'; return r;
          }
          if(r.search_id && clients.find(a=>a.naver_search_id===r.search_id)){
            r.dup=true; r.dup_reason='кІҖмғүкҙ‘кі ID мӨ‘ліө'; return r;
          }
          if(r.gfa_id && clients.find(a=>a.naver_gfa_id===r.gfa_id)){
            r.dup=true; r.dup_reason='GFA ID мӨ‘ліө'; return r;
          }
          // м—‘м…Җ лӮҙл¶Җ мӨ‘ліө мІҙнҒ¬
          if(seenIds.has(r.id)){
            r.dup=true; r.dup_reason='м—‘м…Җ лӮҙ м•„мқҙл”” мӨ‘ліө'; return r;
          }
          if(seenNames.has(r.company)){
            r.dup=true; r.dup_reason='м—‘м…Җ лӮҙ м—…мІҙлӘ… мӨ‘ліө'; return r;
          }
          if(r.search_id && seenSearchIds.has(r.search_id)){
            r.dup=true; r.dup_reason='м—‘м…Җ лӮҙ кІҖмғүкҙ‘кі ID мӨ‘ліө'; return r;
          }
          if(r.gfa_id && seenGfaIds.has(r.gfa_id)){
            r.dup=true; r.dup_reason='м—‘м…Җ лӮҙ GFA ID мӨ‘ліө'; return r;
          }
          // м •мғҒ вҖ” Setм—җ м¶”к°Җ
          seenIds.add(r.id);
          seenNames.add(r.company);
          if(r.search_id) seenSearchIds.add(r.search_id);
          if(r.gfa_id) seenGfaIds.add(r.gfa_id);
          return r;
        });

        const newCount  = bulkData.filter(r=>!r.dup).length;
        const dupCount  = bulkData.filter(r=>r.dup).length;

        const previewHtml = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="font-size:13px;font-weight:600;color:var(--text)">
              лҜёлҰ¬ліҙкё° вҖ” мҙқ ${bulkData.length}к°ң
              <span style="color:var(--naver);font-size:12px;margin-left:8px">вң… мӢ к·ң ${newCount}к°ң</span>
              ${dupCount>0?`<span style="color:var(--text3);font-size:12px;margin-left:6px">вҸӯ мӨ‘ліө ${dupCount}к°ң кұҙл„ҲлңҖ</span>`:''}
            </div>
          </div>
          <div style="overflow-x:auto;max-height:280px;overflow-y:auto;border:1.5px solid var(--border);border-radius:var(--radius)">
            <table class="cl-table">
             <thead><tr>
                <th style="width:40px">No</th>
                <th>м—…мІҙлӘ…</th>
                <th>м•„мқҙл””</th>
                <th>лӢҙлӢ№ л§ӨлӢҲм Җ</th>
                <th>кІҖмғүкҙ‘кі  ID</th>
                <th>GFA ID</th>
                <th style="width:100px">мғҒнғң</th>
              </tr></thead>
              <tbody>
                ${bulkData.map((r,idx)=>`<tr>
                  <td style="color:var(--text3);font-size:11px">${idx+1}</td>
                  <td><b>${r.company}</b></td>
                  <td style="font-size:11.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${r.id}</td>
                  <td style="font-size:12px">${r.manager||'лҜём§Җм •'}</td>
                  <td style="font-size:11.5px;font-family:'IBM Plex Mono',monospace;color:var(--naver)">${r.search_id||'вҖ”'}</td>
                  <td style="font-size:11.5px;font-family:'IBM Plex Mono',monospace;color:var(--blue)">${r.gfa_id&&r.gfa_id!==r.search_id?r.gfa_id:(r.gfa_id?'лҸҷмқј':'вҖ”')}</td>
                  <td>${r.dup
                    ? `<span style="font-size:11px;color:var(--red);background:var(--red-l);padding:2px 8px;border-radius:20px;border:1px solid rgba(239,68,68,.2)" title="${r.dup_reason}">рҹҡ« ${r.dup_reason||'мӨ‘ліө'}</span>`
                    : `<div style="display:flex;align-items:center;gap:4px"><div class="sdot"></div><span style="font-size:11px">мӢ к·ң л“ұлЎқ</span></div>`
                  }</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>`;

        document.getElementById('bulkPreview').innerHTML = previewHtml;
        const btn = document.getElementById('bulkRegisterBtn');
        if(btn) btn.style.display = newCount>0 ? 'inline-flex' : 'none';

      }catch(err){
        document.getElementById('bulkPreview').innerHTML =
          `<div style="color:var(--red);font-size:12.5px;padding:10px">вқҢ нҢҢмқј мқҪкё° мӢӨнҢЁ: ${err.message}</div>`;
      }
    };
    reader.readAsBinaryString(file);
  });
}

async function executeBulkRegister(){
  const toRegister = bulkData.filter(r=>!r.dup);
  if(!toRegister.length){ toast('вҡ пёҸ л“ұлЎқн•  мӢ к·ң м—…мІҙк°Җ м—ҶмҠөлӢҲлӢӨ'); return; }

  const btn = document.getElementById('bulkRegisterBtn');
  if(btn){ btn.disabled=true; btn.textContent='вҸі л“ұлЎқ мӨ‘...'; }

  let successCount = 0, failCount = 0;

  for(const c of toRegister){
    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/clients`,{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SUPABASE_ANON_KEY,
          'Authorization':'Bearer '+SUPABASE_ANON_KEY,
          'Prefer':'return=representation'
        },
        body:JSON.stringify({
          client_key:      c.id,
          password:        c.pw,
          company_name:    c.company,
          manager:         c.manager,
          store_url:       c.url,
          memo:            c.memo||'',
          naver_search_id: c.search_id||null,
          naver_gfa_id:    c.gfa_id||null,
          is_active:       true
        })
      });
      if(!res.ok) throw new Error(await res.text());
      ACCOUNTS.push({id:c.id, pw:c.pw, role:'client', name:c.company, company:c.company, manager:c.manager, url:c.url, memo:c.memo||'', naver_search_id:c.search_id||'', naver_gfa_id:c.gfa_id||''});
      successCount++;
    }catch(err){
      console.error(`${c.company} л“ұлЎқ мӢӨнҢЁ:`, err);
      failCount++;
    }
  }

  closeModal();
  bulkData = [];

  if(failCount===0){
    toast(`вң… ${successCount}к°ң м—…мІҙ мқјкҙ„ л“ұлЎқ мҷ„лЈҢ!`);
  } else {
    toast(`вң… ${successCount}к°ң л“ұлЎқ мҷ„лЈҢ / вқҢ ${failCount}к°ң мӢӨнҢЁ`);
  }
  renderContent('admin');
}
function clearReg(){
  ['rg-name','rg-id','rg-pw','rg-pw2','rg-url','rg-memo','rg-search-id','rg-gfa-id'].forEach(i=>{const el=document.getElementById(i);if(el){el.value='';el.disabled=false;el.style.opacity='1';}});
  const s=document.getElementById('rg-mgr');if(s)s.value='';
  const cb=document.getElementById('rg-gfa-same');if(cb)cb.checked=false;
}

    // м „мІҙ нӮӨмӣҢл“ң н‘ң (мҙқл№„мҡ© лӮҙлҰјм°ЁмҲң)

          нҢҢмқј кҙҖлҰ¬м—җм„ң GFA мқјлі„ нҢҢмқјкіј л§ӨмІҙлі„ нҢҢмқјмқ„ м—…лЎңл“ңн•ҙмЈјм„ёмҡ”
        </p>
      </div>`;
      return;
    }

    // мқјлі„(date мһҲлҠ” кІғ) / л§ӨмІҙлі„(date nullмқё кІғ) л¶„лҰ¬
    const dailyData     = rows.filter(r=>r.date);
    const placementData = rows.filter(r=>!r.date);

    // в”Җв”Җ кІҢмһ¬мң„м№ҳлі„ м§‘кі„ (л§ӨмІҙлі„ нҢҢмқј кё°мӨҖ) в”Җв”Җ
    const placementMap = {};
    placementData.forEach(r=>{
      const p = r.placement||'кё°нғҖ';
      if(!placementMap[p]) placementMap[p]={placement:p,cost:0,imp:0,click:0,conv:0,rev:0,cart_conv:0,cart_rev:0};
      placementMap[p].cost     +=+r.cost||0;
      placementMap[p].imp      +=+r.imp||0;
      placementMap[p].click    +=+r.click||0;
      placementMap[p].conv     +=+r.conv||0;
      placementMap[p].rev      +=+r.rev||0;
      placementMap[p].cart_conv+=+r.cart_conv||0;
      placementMap[p].cart_rev +=+r.cart_rev||0;
    });
    const placements = Object.values(placementMap).sort((a,b)=>b.cost-a.cost);

    const placementRows = placements.map(p=>`
      <tr>
        <td style="font-size:12.5px;font-weight:600">${p.placement}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmt(p.cost)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmtn(p.imp)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmtn(p.click)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${p.imp>0?(p.click/p.imp*100).toFixed(2)+'%':'вҖ”'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${p.click>0?fmt(Math.round(p.cost/p.click)):'вҖ”'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmtn(p.conv)}кұҙ</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmtn(p.cart_conv)}кұҙ</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmt(p.rev)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:${roasColor(p.cost,p.rev)}">${calcR(p.cost,p.rev)}</td>
      </tr>`).join('');

    // в”Җв”Җ мқјлі„ м§‘кі„ (мқјлі„ нҢҢмқј кё°мӨҖ, лӮ м§ңлі„ н•©мӮ°) в”Җв”Җ
    const dailyMap = {};
    dailyData.forEach(r=>{
      const d = r.date||'';
      if(!d) return;
      if(!dailyMap[d]) dailyMap[d]={date:d,cost:0,imp:0,click:0,conv:0,rev:0,cart_conv:0,cart_rev:0};
      dailyMap[d].cost     +=+r.cost||0;
      dailyMap[d].imp      +=+r.imp||0;
      dailyMap[d].click    +=+r.click||0;
      dailyMap[d].conv     +=+r.conv||0;
      dailyMap[d].rev      +=+r.rev||0;
      dailyMap[d].cart_conv+=+r.cart_conv||0;
      dailyMap[d].cart_rev +=+r.cart_rev||0;
    });
    const dailyList = Object.values(dailyMap).sort((a,b)=>a.date.localeCompare(b.date));

    // мЈјм°Ё кі„мӮ° н•ЁмҲҳ
    const getWeek = date => {
      const day = new Date(date).getDate();
      return day<=7?'1мЈј':day<=14?'2мЈј':day<=21?'3мЈј':'4мЈј';
    };

    // мЈјм°Ёлі„ мҶҢкі„ м§‘кі„
    const weekSumMap = {};
    dailyList.forEach(r=>{
      const wk = getWeek(r.date);
      if(!weekSumMap[wk]) weekSumMap[wk]={cost:0,imp:0,click:0,conv:0,rev:0,cart_conv:0};
      weekSumMap[wk].cost     +=+r.cost||0;
      weekSumMap[wk].imp      +=+r.imp||0;
      weekSumMap[wk].click    +=+r.click||0;
      weekSumMap[wk].conv     +=+r.conv||0;
      weekSumMap[wk].rev      +=+r.rev||0;
      weekSumMap[wk].cart_conv+=+r.cart_conv||0;
    });

    let prevWeek = '';
    const dailyRows = dailyList.map((r,idx)=>{
      const wd   = r.date ? WEEKDAYS[new Date(r.date).getDay()] : 'вҖ”';
      const cpc  = r.click>0 ? Math.round(r.cost/r.click) : 0;
      const wk   = getWeek(r.date);
      const isNewWeek = wk !== prevWeek;

      // мЈјм°Ё кө¬л¶„м„  вҖ” мғҲ мЈјм°Ё мӢңмһ‘ н–ү м•һм—җ мҶҢкі„ н–ү мӮҪмһ… (мІ« мЈј м ңмҷё)
      let weekSumRow = '';
      if(isNewWeek && prevWeek && weekSumMap[prevWeek]){
        const ws = weekSumMap[prevWeek];
        const wCpc = ws.click>0 ? Math.round(ws.cost/ws.click) : 0;
        weekSumRow = `<tr style="background:var(--surface);border-top:2.5px solid var(--border2);border-bottom:2.5px solid var(--border2)">
          <td colspan="2" style="font-size:12px;font-weight:700;color:var(--text2);padding:8px 12px">рҹ“Ҡ ${prevWeek} мҶҢкі„</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmt(ws.cost)}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmtn(ws.imp)}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmtn(ws.click)}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${ws.imp>0?(ws.click/ws.imp*100).toFixed(2)+'%':'вҖ”'}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${wCpc>0?fmt(wCpc):'вҖ”'}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmtn(ws.conv)}кұҙ</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmtn(ws.cart_conv)}кұҙ</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmt(ws.rev)}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:${roasColor(ws.cost,ws.rev)}">${calcR(ws.cost,ws.rev)}</td>
        </tr>`;
      }
      prevWeek = wk;

      // л§Ҳм§Җл§ү н–үмқҙл©ҙ л’Өм—җ л§Ҳм§Җл§ү мЈјм°Ё мҶҢкі„лҸ„ м¶”к°Җ
      const isLast = idx === dailyList.length - 1;
      let lastWeekSumRow = '';
      if(isLast && weekSumMap[wk]){
        const ws = weekSumMap[wk];
        const wCpc = ws.click>0 ? Math.round(ws.cost/ws.click) : 0;
        lastWeekSumRow = `<tr style="background:var(--surface);border-top:2.5px solid var(--border2);border-bottom:2.5px solid var(--border2)">
          <td colspan="2" style="font-size:12px;font-weight:700;color:var(--text2);padding:8px 12px">рҹ“Ҡ ${wk} мҶҢкі„</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmt(ws.cost)}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmtn(ws.imp)}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmtn(ws.click)}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${ws.imp>0?(ws.click/ws.imp*100).toFixed(2)+'%':'вҖ”'}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${wCpc>0?fmt(wCpc):'вҖ”'}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmtn(ws.conv)}кұҙ</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmtn(ws.cart_conv)}кұҙ</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700">${fmt(ws.rev)}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:${roasColor(ws.cost,ws.rev)}">${calcR(ws.cost,ws.rev)}</td>
        </tr>`;
      }

      const borderStyle = isNewWeek ? 'border-top:2.5px solid var(--blue);' : '';
      const dataRow = `<tr style="${borderStyle}">
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${r.date}</td>
        <td style="font-size:12px;color:var(--text3);text-align:center">${wd}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmt(r.cost)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmtn(r.imp)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmtn(r.click)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${r.imp>0?(r.click/r.imp*100).toFixed(2)+'%':'вҖ”'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${cpc>0?fmt(cpc):'вҖ”'}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmtn(r.conv)}кұҙ</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmtn(r.cart_conv)}кұҙ</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${fmt(r.rev)}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:${roasColor(r.cost,r.rev)}">${calcR(r.cost,r.rev)}</td>
      </tr>`;

      return weekSumRow + dataRow + lastWeekSumRow;
    }).join('');

    // KPIлҠ” мқјлі„ лҚ°мқҙн„° кё°мӨҖ (лҚ” м •нҷ•)
    const kpiBase = dailyData.length ? dailyData : rows;
    el.innerHTML = renderShell(kpiBase, placementRows, dailyRows, dailyList.length);

    // в”Җв”Җ м°ЁнҠё к·ёлҰ¬кё° в”Җв”Җ
    setTimeout(()=>{
      const ax = {
        grid:{color:'#dce6f0'},
        ticks:{color:'#8a96ae',font:{size:10,family:'IBM Plex Mono'}}
      };

      // мЈјм°Ёлі„ лҚ°мқҙн„° м§‘кі„
      const weekMap = {};
      dailyList.forEach(r=>{
        const d = new Date(r.date);
        const day = d.getDate();
        const wk = day<=7?'1мЈј':day<=14?'2мЈј':day<=21?'3мЈј':'4мЈј';
        if(!weekMap[wk]) weekMap[wk]={wk,imp:0,click:0,cost:0,conv:0,rev:0,cpc:0,days:0};
        weekMap[wk].imp   += +r.imp  ||0;
        weekMap[wk].click += +r.click||0;
        weekMap[wk].cost  += +r.cost ||0;
        weekMap[wk].conv  += +r.conv ||0;
        weekMap[wk].rev   += +r.rev  ||0;
        weekMap[wk].days  += 1;
      });
      const weeks = ['1мЈј','2мЈј','3мЈј','4мЈј'].filter(w=>weekMap[w]);
      const wLabels = weeks;
      const wImp    = weeks.map(w=>weekMap[w].imp);
      const wClick  = weeks.map(w=>weekMap[w].click);
      const wCost   = weeks.map(w=>weekMap[w].cost);
      const wRoas   = weeks.map(w=>weekMap[w].cost>0?(weekMap[w].rev/weekMap[w].cost*100):0);

      // мқјлі„ лҚ°мқҙн„°
      const dLabels = dailyList.map(r=>r.date.slice(5)); // MM-DD
      const dImp    = dailyList.map(r=>+r.imp  ||0);
      const dClick  = dailyList.map(r=>+r.click||0);
      const dCost   = dailyList.map(r=>+r.cost ||0);
      const dCpc    = dailyList.map(r=>r.click>0?Math.round(r.cost/r.click):0);

      const mk = (id, cfg) => {
        const el2 = document.getElementById(id);
        if(!el2) return;
        try{
          if(charts[id]) charts[id].destroy();
          charts[id] = new Chart(el2, cfg);
        }catch(e){}
      };

      // в‘  мЈјм°Ёлі„ л…ём¶ңмҲҳВ·нҒҙлҰӯмҲҳ
      mk('gfaWeekBar',{type:'bar',data:{
        labels: wLabels,
        datasets:[
          {label:'л…ём¶ңмҲҳ', data:wImp,   backgroundColor:'rgba(3,199,90,.5)',  borderRadius:6, yAxisID:'y'},
          {label:'нҒҙлҰӯмҲҳ', data:wClick, type:'line', borderColor:'#F59E0B', backgroundColor:'rgba(245,158,11,.1)', borderWidth:2, tension:.4, fill:true, pointRadius:4, yAxisID:'y1'},
        ]
      },options:{responsive:true,
        scales:{
          x:ax,
          y:{...ax,position:'left',ticks:{...ax.ticks,color:'#03C75A',callback:v=>v.toLocaleString()}},
          y1:{grid:{display:false},ticks:{color:'#F59E0B',font:{size:10,family:'IBM Plex Mono'},callback:v=>v.toLocaleString()},position:'right'}
        },
        plugins:{legend:{labels:{color:'#4a5670',font:{size:11,family:'Noto Sans KR'},padding:12}}}
      }});

      // в‘Ў мЈјм°Ёлі„ кҙ‘кі л№„В·ROAS
      mk('gfaWeekRoas',{type:'bar',data:{
        labels: wLabels,
        datasets:[
          {label:'кҙ‘кі л№„', data:wCost, backgroundColor:'rgba(79,70,229,.5)', borderRadius:6, yAxisID:'y'},
          {label:'ROAS(%)', data:wRoas, type:'line', borderColor:'#EF4444', backgroundColor:'rgba(239,68,68,.08)', borderWidth:2, tension:.4, fill:true, pointRadius:4, yAxisID:'y1'},
        ]
      },options:{responsive:true,
        scales:{
          x:ax,
          y:{...ax,position:'left',ticks:{...ax.ticks,color:'#4F46E5',callback:v=>'вӮ©'+Math.round(v).toLocaleString()}},
          y1:{grid:{display:false},ticks:{color:'#EF4444',font:{size:10,family:'IBM Plex Mono'},callback:v=>v.toFixed(0)+'%'},position:'right'}
        },
        plugins:{legend:{labels:{color:'#4a5670',font:{size:11,family:'Noto Sans KR'},padding:12}}}
      }});

      // в‘ў мқјлі„ л…ём¶ңмҲҳВ·нҒҙлҰӯмҲҳ
      mk('gfaDailyBar',{type:'bar',data:{
        labels: dLabels,
        datasets:[
          {label:'л…ём¶ңмҲҳ', data:dImp,   backgroundColor:'rgba(3,199,90,.4)',  borderRadius:4, yAxisID:'y'},
          {label:'нҒҙлҰӯмҲҳ', data:dClick, type:'line', borderColor:'#F59E0B', backgroundColor:'rgba(245,158,11,.08)', borderWidth:2, tension:.4, fill:true, pointRadius:2, yAxisID:'y1'},
        ]
      },options:{responsive:true,
        scales:{
          x:{...ax,ticks:{...ax.ticks,maxTicksLimit:15}},
          y:{...ax,position:'left',ticks:{...ax.ticks,color:'#03C75A',callback:v=>v.toLocaleString()}},
          y1:{grid:{display:false},ticks:{color:'#F59E0B',font:{size:10,family:'IBM Plex Mono'},callback:v=>v.toLocaleString()},position:'right'}
        },
        plugins:{legend:{labels:{color:'#4a5670',font:{size:11,family:'Noto Sans KR'},padding:12}}}
      }});

      // в‘Ј мқјлі„ кҙ‘кі л№„В·нҸүк· CPC
      mk('gfaDailyCost',{type:'bar',data:{
        labels: dLabels,
        datasets:[
          {label:'кҙ‘кі л№„',   data:dCost, backgroundColor:'rgba(79,70,229,.4)', borderRadius:4, yAxisID:'y'},
          {label:'нҸүк· CPC', data:dCpc,  type:'line', borderColor:'#FF6B35', backgroundColor:'rgba(255,107,53,.08)', borderWidth:2, tension:.4, fill:true, pointRadius:2, yAxisID:'y1'},
        ]
      },options:{responsive:true,
        scales:{
          x:{...ax,ticks:{...ax.ticks,maxTicksLimit:15}},
          y:{...ax,position:'left',ticks:{...ax.ticks,color:'#4F46E5',callback:v=>'вӮ©'+Math.round(v).toLocaleString()}},
          y1:{grid:{display:false},ticks:{color:'#FF6B35',font:{size:10,family:'IBM Plex Mono'},callback:v=>'вӮ©'+v.toLocaleString()},position:'right'}
        },
        plugins:{legend:{labels:{color:'#4a5670',font:{size:11,family:'Noto Sans KR'},padding:12}}}
      }});

    }, 100);

  }catch(e){
    el.innerHTML=`<div class="empty"><div class="ei">вқҢ</div><p>лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ: ${e.message}</p></div>`;
  }
}
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   UTILS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function toast(msg,dur=2800){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}
function openDownload(){
  document.getElementById('modalTitle').textContent='лҰ¬нҸ¬нҠё лӢӨмҡҙлЎңл“ң';
  document.getElementById('modalBody').innerHTML=`<p style="font-size:13px;color:var(--text2);margin-bottom:12px">ліҙкі м„ңнҷ•мқё л©”лүҙм—җм„ң мӣ”лі„ PDFлҘј лӢӨмҡҙлЎңл“ңн•ҳкұ°лӮҳ м•„лһҳ нҢҢмқјмқ„ м„ нғқн•ҳм„ёмҡ”.</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="radio" name="dl" checked> 2026л…„ 2мӣ” нҶөн•© м„ұкіј лҰ¬нҸ¬нҠё</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="radio" name="dl"> 2025л…„ 12мӣ” нҶөн•© м„ұкіј лҰ¬нҸ¬нҠё</label>
    </div>`;
  document.getElementById('modalFooter').innerHTML=`<button class="btn btn-ol" onclick="closeModal()">м·ЁмҶҢ</button><button class="btn btn-bl" onclick="go('report',null);setActive('report');openPdfPreview();closeModal()">рҹ“„ PDF м—ҙкё°</button>`;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('click',e=>{
  const overlay=document.getElementById('pdfOverlay');
  if(overlay&&e.target===overlay)closePdfOverlay();
});
/* в”Җв”Җ мғҲлЎңкі м№Ё мӢң лЎңк·ёмқё мғҒнғң ліөмӣҗ в”Җв”Җ */
(function(){
  const saved         = sessionStorage.getItem('currentUser');
  const savedPage     = sessionStorage.getItem('currentPage') || 'combined';
  const savedClientId = sessionStorage.getItem('activeClientId');
  if(saved){
    currentUser = JSON.parse(saved);
    if(savedClientId) activeClientId = savedClientId;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('appShell').style.display='block';
    const page = savedPage === 'combined' && currentUser.role === 'admin' && !savedClientId ? 'admin' : savedPage;
    initApp(page);
  }
})();
