<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>л””м–ҙм»ҙнҚјлӢҲ мҶ”лЈЁм…ҳ</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/dearcompany-solution/SiteDear/main/logo.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/dearcompany-solution/SiteDear/main/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* в•җв•җв•җв•җ кё°ліё ліҖмҲҳ в•җв•җв•җв•җ */
:root {
  --bg:#e8eef6; --bg2:#dde5f0; --white:#fff; --surface:#f3f6fb;
  --border:#cfd8e8; --border2:#b8c5d9;
  --text:#1a2235; --text2:#4a5670; --text3:#8a96ae;
  --naver:#03C75A; --naver-l:#e6f9ef; --naver-m:rgba(3,199,90,.13);
  --store:#FF6B35; --store-l:#fff2ec; --store-m:rgba(255,107,53,.13);
  --blue:#3B82F6; --blue-l:#eff6ff; --blue-m:rgba(59,130,246,.13);
  --gold:#F59E0B; --gold-l:#fffbeb;
  --red:#EF4444; --red-l:#fef2f2;
  --indigo:#4F46E5; --indigo-l:#eef2ff;
  --navy:#1c2535; --navy2:#253047;
  --radius:14px; --rsm:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.07);
  --shm:0 4px 20px rgba(0,0,0,.11);
  --sw:236px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* в•җв•җв•җв•җ LOGIN в•җв•җв•җв•җ */
#loginPage{display:flex;min-height:100vh;background:linear-gradient(135deg,#d4e3f5 0%,#e8eef6 50%,#dde8f4 100%);align-items:center;justify-content:center;position:relative;overflow:hidden}
#loginPage::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 15% 25%,rgba(59,130,246,.1) 0%,transparent 70%),radial-gradient(ellipse 500px 400px at 85% 75%,rgba(3,199,90,.07) 0%,transparent 70%)}
.lcrd{background:var(--white);border-radius:20px;padding:44px 44px 40px;width:420px;box-shadow:0 8px 40px rgba(0,0,0,.13);position:relative;z-index:1;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.l-brand{text-align:center;margin-bottom:28px}
.l-co{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.l-prod{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.l-prod em{color:var(--blue);font-style:normal}
.l-sub{font-size:12px;color:var(--text3);margin-top:3px}
.lhr{height:1px;background:var(--border);margin:20px 0}
.lg{margin-bottom:14px}
.lg label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.lg input{width:100%;border:1.5px solid var(--border);border-radius:var(--rsm);padding:10px 13px;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:all .15s}
.lg input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-m);background:var(--white)}
.lbtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--rsm);padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;margin-top:4px}
.lbtn:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 4px 14px rgba(59,130,246,.35)}
.lerr{color:var(--red);font-size:12.5px;text-align:center;margin-top:9px;display:none}
.lhint{margin-top:18px;padding:13px;background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);font-size:11.5px;color:var(--text3);line-height:1.9}
.lhint b{color:var(--text2)}

/* в•җв•җв•җв•җ APP в•җв•җв•җв•җ */
#appShell{display:none}

/* в•җв•җв•җв•җ SIDEBAR в•җв•җв•җв•җ */
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;box-shadow:2px 0 12px rgba(0,0,0,.05)}
.sb-top{padding:17px 18px 14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%)}
.sb-co{font-size:9.5px;letter-spacing:2.5px;color:rgba(255,255,255,.4);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-bottom:3px}
.sb-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.2}
.sb-name em{color:#60a5fa;font-style:normal}
.sb-tag{font-size:9.5px;color:rgba(255,255,255,.3);margin-top:2px;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px}
.nav{padding:10px 10px;flex:1;overflow-y:auto}
.nsec{font-size:9.5px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;padding:10px 10px 4px;font-family:'IBM Plex Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--rsm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.active{background:var(--blue-l);color:var(--blue);font-weight:600}
.ni.adm{background:linear-gradient(90deg,rgba(79,70,229,.07),transparent)}
.ni.adm.active{background:var(--indigo-l);color:var(--indigo)}
.ni.rpt{background:linear-gradient(90deg,rgba(3,199,90,.07),transparent)}
.ni.rpt.active{background:var(--naver-l);color:var(--naver);font-weight:600}
.ni .ic{font-size:15px;width:18px;text-align:center}
.nbadge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
.nb-g{background:var(--naver-m);color:var(--naver)}.nb-r{background:rgba(239,68,68,.13);color:var(--red)}.nb-b{background:var(--blue-m);color:var(--blue)}
.sb-bottom{border-top:1px solid var(--border)}
.sb-client{padding:11px 14px;background:var(--surface)}
.sb-cl-lbl{font-size:9.5px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;font-family:'IBM Plex Mono',monospace}
.sb-cl-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rsm);padding:9px 12px}
.sb-cl-name{font-size:13px;font-weight:700}
.sb-cl-id{font-size:10.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.sb-st{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--naver);margin-top:5px;font-weight:500}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--naver);box-shadow:0 0 0 2px var(--naver-m)}
.sb-logout{margin:0 10px 12px;display:flex}
.btn-lo{width:100%;background:var(--red-l);border:1.5px solid rgba(239,68,68,.2);color:var(--red);border-radius:var(--rsm);padding:8px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;text-align:center}
.btn-lo:hover{background:var(--red);color:#fff}

/* в•җв•җв•җв•җ TOPBAR в•җв•җв•җв•җ */
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);padding:12px 26px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tb-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tb-title{font-size:15.5px;font-weight:700;letter-spacing:-.3px}
.tb-sub{font-size:11.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.tb-actions{display:flex;gap:8px;align-items:center}
.date-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dq-btn{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);background:var(--white);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap}
.dq-btn:hover{border-color:var(--blue);color:var(--blue)}
.dq-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.date-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
.date-custom{display:flex;align-items:center;gap:6px}
.date-custom input{border:1.5px solid var(--border2);border-radius:var(--rsm);padding:5px 10px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text);background:var(--white);outline:none;transition:border-color .15s;cursor:pointer}
.date-custom input:focus{border-color:var(--blue)}
.date-custom span{font-size:12px;color:var(--text3)}
.drange-label{font-size:12px;font-weight:600;color:var(--text2);padding:5px 12px;background:var(--surface);border-radius:20px;border:1.5px solid var(--border);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.nav-tab{padding:9px 16px;font-size:12.5px;font-weight:500;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:var(--blue)}
.nav-tab.active{color:var(--blue);font-weight:700;border-bottom-color:var(--blue)}

/* в•җв•җв•җв•җ MAIN в•җв•җв•җв•җ */
.main{margin-left:var(--sw);min-height:100vh}
.content{padding:22px 26px}
.panel{display:none}
.panel.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* в•җв•җв•җв•җ BUTTONS в•җв•җв•җв•җ */
.btn{border:none;border-radius:var(--rsm);font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-size:12.5px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;line-height:1}
.btn-ol{background:var(--white);border:1.5px solid var(--border2);color:var(--text2);padding:7px 13px}
.btn-ol:hover{border-color:var(--blue);color:var(--blue)}
.btn-bl{background:var(--blue);color:#fff;padding:8px 15px}
.btn-bl:hover{background:#2563eb}
.btn-gn{background:var(--naver);color:#fff;padding:8px 15px}
.btn-or{background:var(--store);color:#fff;padding:8px 15px}
.btn-in{background:var(--indigo);color:#fff;padding:8px 15px}
.btn-rd{background:var(--red);color:#fff;padding:7px 13px}
.btn-sm{padding:5px 10px;font-size:11.5px}

/* в•җв•җв•җв•җ KPI в•җв•җв•җв•җ */
.kpi6{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
.kpi{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:box-shadow .2s}
.kpi:hover{box-shadow:var(--shm)}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.kpi.kn::after{background:var(--naver)}.kpi.kb::after{background:var(--blue)}.kpi.kg::after{background:var(--gold)}.kpi.ks::after{background:var(--store)}.kpi.kr::after{background:var(--red)}.kpi.ki::after{background:var(--indigo)}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kpi-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.kic-n{background:var(--naver-l)}.kic-b{background:var(--blue-l)}.kic-g{background:var(--gold-l)}.kic-s{background:var(--store-l)}.kic-r{background:var(--red-l)}.kic-i{background:var(--indigo-l)}
.kpi-chip{font-size:9.5px;padding:2px 8px;border-radius:20px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.kc-n{background:var(--naver-m);color:var(--naver)}.kc-s{background:var(--store-m);color:var(--store)}
.kpi-lbl{font-size:11.5px;color:var(--text2);margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:700;letter-spacing:-.7px;font-family:'IBM Plex Mono',monospace;line-height:1;margin-bottom:7px}
.kpi-ch{font-size:11.5px;display:flex;align-items:center;gap:3px}
.up{color:var(--naver)}.dn{color:var(--red)}.vs{color:var(--text3);margin-left:3px}

/* в•җв•җв•җв•җ CARDS в•җв•җв•җв•җ */
.row2{display:grid;grid-template-columns:2fr 1fr;gap:13px;margin-bottom:18px}
.row2b{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--sh)}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:15px}
.card-title{font-size:14px;font-weight:600;letter-spacing:-.2px}
.card-sub{font-size:11.5px;color:var(--text3);margin-top:2px}
.sec-lbl{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-lbl span{font-size:10.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.sum-bar{display:flex;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sh);margin-bottom:18px}
.sum-item{flex:1;padding:14px 16px;border-right:1px solid var(--border)}
.sum-item:last-child{border-right:none}
.sum-lbl{font-size:11px;color:var(--text3);margin-bottom:4px}
.sum-val{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:-.5px}
.sum-ch{font-size:11px;margin-top:3px}

/* в•җв•җв•җв•җ TABLE в•җв•җв•җв•җ */
.tbl{width:100%;border-collapse:collapse}
th{font-size:10.5px;color:var(--text3);text-align:left;padding:8px 12px;border-bottom:1.5px solid var(--border);font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
td{font-size:13px;padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface)}
.rank{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.r1{background:rgba(245,158,11,.15);color:var(--gold)}.r2{background:rgba(148,163,184,.12);color:#888}.r3{background:rgba(180,100,60,.1);color:#b46038}.rn{background:var(--surface);color:var(--text3)}
.bar-w{display:flex;align-items:center;gap:7px}
.bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;min-width:50px}
.bar-fg{height:100%;border-radius:3px}.bar-nv{background:var(--naver)}.bar-st{background:var(--store)}
.pct{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;min-width:30px;text-align:right}

/* в•җв•җв•җв•җ DATA INPUT в•җв•җв•җв•җ */
.itabs{display:flex;gap:8px;margin-bottom:16px}
.itab{padding:8px 18px;border-radius:var(--rsm);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.itab.a-nv{background:var(--naver-l);border-color:var(--naver);color:var(--naver);font-weight:600}
.itab.a-st{background:var(--store-l);border-color:var(--store);color:var(--store);font-weight:600}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.fg .full{grid-column:1/-1}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:11.5px;font-weight:600;color:var(--text2)}
.fl .req{color:var(--naver)}
.fi{border:1.5px solid var(--border2);border-radius:var(--rsm);padding:9px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--white);outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-m)}
.saved-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);margin-bottom:7px}
.saved-meta{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px}

/* в•җв•җв•җв•җ MESSAGING в•җв•җв•җв•җ */
.msg-layout{display:grid;grid-template-columns:280px 1fr;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sh);min-height:480px}
.msg-sb{border-right:1px solid var(--border);display:flex;flex-direction:column}
.msg-sb-hd{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.msg-thread{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;position:relative}
.msg-thread:hover{background:var(--surface)}
.msg-thread.active{background:var(--blue-l)}
.msg-thread.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue)}
.mt-name{font-size:13px;font-weight:600}
.mt-time{font-size:10.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.mt-prev{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.ubadge{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--blue);margin-left:5px;vertical-align:middle}
.msg-main{display:flex;flex-direction:column}
.msg-main-hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat{flex:1;padding:14px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
.brow{display:flex;gap:9px}
.brow.mine{flex-direction:row-reverse}
.bav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.bav-m{background:var(--naver-l);color:var(--naver)}.bav-c{background:var(--blue-l);color:var(--blue)}
.bubble{max-width:72%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6}
.bubble.mgr{background:var(--white);border:1px solid var(--border)}.bubble.cli{background:var(--blue);color:#fff}
.bmeta{font-size:10.5px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.brow.mine .bmeta{text-align:right}
.msg-inp{padding:11px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.msg-inp textarea{flex:1;border:1.5px solid var(--border2);border-radius:var(--rsm);padding:8px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;height:40px;transition:border-color .15s;background:var(--surface)}
.msg-inp textarea:focus{border-color:var(--blue);background:var(--white)}

/* в•җв•җв•җв•җ CALENDAR в•җв•җв•җв•җ */
.notice-pinned{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--rsm);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:opacity .15s}
.notice-pinned:hover{opacity:.9}
.np-icon{font-size:16px;flex-shrink:0}
.np-content{flex:1;min-width:0}
.np-title{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-meta{font-size:10.5px;color:rgba(255,255,255,.45);margin-top:1px;font-family:'IBM Plex Mono',monospace}
.np-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;background:var(--blue);color:#fff;white-space:nowrap;flex-shrink:0}
.cal-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cal-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--sh)}
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-month{font-size:15px;font-weight:700;min-width:120px;text-align:center}
.cal-nav-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--blue);color:var(--blue)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;font-family:'IBM Plex Mono',monospace}
.cal-day{position:relative;text-align:center;padding:6px 2px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s;min-height:34px;display:flex;flex-direction:column;align-items:center;gap:2px}
.cal-day:hover{background:var(--blue-l)}
.cal-day.today{background:var(--blue);color:#fff;font-weight:700}
.cal-day.today:hover{background:#2563eb}
.cal-day.other-month{color:var(--text3)}
.cal-day.has-event .ev-dot{display:flex}
.cal-day.today .ev-dot{background:#fff}
.ev-dot{display:none;width:5px;height:5px;border-radius:50%;background:var(--store)}
.ev-dots{display:flex;gap:2px;justify-content:center}
.ev-day-dot{width:4px;height:4px;border-radius:50%}
.ev-panel{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:0}
.ev-panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ev-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.ev-item{padding:11px 13px;border-radius:var(--rsm);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s}
.ev-item:hover{border-color:var(--blue);background:var(--blue-l)}
.ev-tag{font-size:9.5px;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-block;margin-bottom:4px}
.et-meet{background:var(--blue-l);color:var(--blue)}.et-rep{background:var(--naver-l);color:var(--naver)}.et-notice{background:var(--gold-l);color:var(--gold)}.et-task{background:var(--indigo-l);color:var(--indigo)}
.ev-title{font-size:13px;font-weight:600;margin-bottom:2px}
.ev-meta{font-size:11.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.ev-empty{text-align:center;padding:30px 0;color:var(--text3)}
.ev-empty .ei{font-size:28px;margin-bottom:6px}
.ev-form{background:var(--surface);border-radius:var(--rsm);border:1.5px solid var(--border);padding:14px;margin-top:12px}
.ef-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ef-grid .full{grid-column:1/-1}
.ef{display:flex;flex-direction:column;gap:4px}
.ef label{font-size:11.5px;font-weight:600;color:var(--text2)}
.ef input,.ef select,.ef textarea{border:1.5px solid var(--border2);border-radius:var(--rsm);padding:7px 10px;font-size:12.5px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--white);outline:none;transition:border-color .15s;width:100%}
.ef input:focus,.ef select:focus,.ef textarea:focus{border-color:var(--blue)}

/* в•җв•җв•җв•җ APPROVAL в•җв•җв•җв•җ */
.appr-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:17px 19px;box-shadow:var(--sh);margin-bottom:11px}
.appr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:11px}
.appr-ic{width:35px;height:35px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.appr-type{font-size:13.5px;font-weight:600}
.appr-date{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.sbadge{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
.sw-b{background:rgba(245,158,11,.14);color:var(--gold)}.sd-b{background:var(--naver-m);color:var(--naver)}.sr-b{background:rgba(239,68,68,.12);color:var(--red)}
.appr-desc{font-size:12.5px;color:var(--text2);line-height:1.7;margin-bottom:11px;padding:10px;background:var(--surface);border-radius:var(--rsm)}
.fchip{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:11.5px;color:var(--text2);cursor:pointer;margin-right:6px;margin-bottom:7px}
.fchip:hover{border-color:var(--blue);color:var(--blue)}

/* в•җв•җв•җв•җ NOTICE в•җв•җв•җв•җ */
.ncard{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rsm);padding:12px 15px;display:flex;align-items:center;gap:11px;box-shadow:var(--sh);cursor:pointer;transition:box-shadow .15s;margin-bottom:8px}
.ncard:hover{box-shadow:var(--shm)}
.ntag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;display:inline-block;margin-bottom:3px}
.nt-r{background:var(--blue-l);color:var(--blue)}.nt-n{background:var(--gold-l);color:var(--gold)}.nt-u{background:var(--store-l);color:var(--store)}

/* в•җв•җв•җв•җ ADMIN в•җв•җв•җв•җ */
.admin-hero{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--radius);padding:19px 23px;margin-bottom:17px;display:flex;align-items:center;justify-content:space-between}
.admin-hero h2{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px}
.admin-hero p{font-size:12.5px;color:rgba(255,255,255,.5)}
.cl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px}
.cl-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:15px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.cl-card:hover{box-shadow:var(--shm);border-color:var(--blue)}
.cl-card.sel{border-color:var(--blue);background:var(--blue-l)}
.cl-name{font-size:14px;font-weight:700;margin-bottom:2px}
.cl-id{font-size:10.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.cl-mgr{font-size:12px;color:var(--text2);margin-top:4px}
  .cl-table{width:100%;border-collapse:collapse;font-size:13px}
.cl-table th{background:var(--surface);font-size:11.5px;font-weight:600;color:var(--text2);padding:9px 12px;text-align:left;border-bottom:2px solid var(--border)}
.cl-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.cl-table tr:hover td{background:var(--blue-l)}
.cl-table tr.sel-row td{background:var(--blue-l);font-weight:600}
.cl-table td .act-btns{display:flex;gap:5px}
.admin-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.admin-toolbar input[type=text]{flex:1;min-width:160px;padding:7px 11px;border:1px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none}
.admin-toolbar input[type=text]:focus{border-color:var(--blue)}
.admin-toolbar select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--white);outline:none;cursor:pointer}
.pg-bar{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:12.5px;color:var(--text2)}
.pg-btns{display:flex;gap:4px}
.pg-btn{border:1px solid var(--border);background:var(--white);border-radius:var(--rsm);padding:5px 10px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.pg-btn:hover{background:var(--surface)}
.pg-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.cl-url{font-size:11px;color:var(--blue);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cl-st{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--naver);margin-top:5px;font-weight:600}
.reg-form{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--sh)}
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rg{display:flex;flex-direction:column;gap:5px}
.rg label{font-size:12px;font-weight:600;color:var(--text2)}
.rg input,.rg select{border:1.5px solid var(--border2);border-radius:var(--rsm);padding:9px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--white);outline:none;transition:border-color .15s;width:100%}
.rg input:focus,.rg select:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.rg.full{grid-column:1/-1}

/* в•җв•җв•җв•җ ліҙкі м„ңнҷ•мқё нҢЁл„җ CSS в•җв•җв•җв•җ */
.rpt-hero{background:linear-gradient(135deg,#1c2535 0%,#253047 100%);border-radius:var(--radius);padding:20px 24px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.rpt-hero-left h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:3px}
.rpt-hero-left p{font-size:12px;color:rgba(255,255,255,.45)}
.rpt-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.month-sel{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:var(--rsm);padding:7px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:#fff;outline:none;cursor:pointer}
.month-sel option{color:var(--text);background:#fff}
.btn-pdf{background:#EF4444;color:#fff;border:none;border-radius:var(--rsm);padding:8px 16px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-pdf:hover{background:#dc2626;transform:translateY(-1px)}
.rpt-kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.rpt-kpi{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden}
.rpt-kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.rpt-kpi.rk1::after{background:#03C75A}.rpt-kpi.rk2::after{background:#3B82F6}.rpt-kpi.rk3::after{background:#F59E0B}.rpt-kpi.rk4::after{background:#FF6B35}.rpt-kpi.rk5::after{background:#4F46E5}
.rpt-kpi-lbl{font-size:11px;color:var(--text3);margin-bottom:6px}
.rpt-kpi-val{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:-.5px}
.rpt-kpi-sub{font-size:11px;margin-top:4px}
.rpt-section{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.rpt-section-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rpt-section-title span{font-size:11px;color:var(--text3);font-weight:400}
.rpt-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.rpt-chart-wrap{position:relative;height:200px}
.kw-tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.kw-mo{background:var(--store-l);color:var(--store)}.kw-pc{background:var(--blue-l);color:var(--blue)}
.time-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.time-lbl{font-size:12px;color:var(--text2);width:105px;flex-shrink:0}
.time-bar-bg{flex:1;height:22px;background:var(--bg);border-radius:4px;overflow:hidden}
.time-bar-fg{height:100%;display:flex;align-items:center;padding-left:8px}
.time-bar-txt{font-size:10.5px;font-family:'IBM Plex Mono',monospace;font-weight:600}
.time-conv{width:80px;text-align:right;font-size:11.5px;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.monthly-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.month-pill{padding:10px 8px;border-radius:8px;text-align:center;cursor:pointer;border:1.5px solid var(--border);transition:all .15s;background:var(--surface)}
.month-pill:hover{border-color:var(--blue);background:var(--blue-l)}
.month-pill.mp-active{border-color:var(--blue);background:var(--blue);color:#fff}
.month-pill .mp-mo{font-size:11px;font-weight:600;margin-bottom:3px}
.month-pill .mp-roas{font-size:10px;font-family:'IBM Plex Mono',monospace}
.insight-box{padding:12px 14px;border-radius:var(--rsm);border-left:4px solid;margin-bottom:8px}
.ib-good{background:var(--naver-l);border-color:var(--naver)}.ib-warn{background:var(--store-l);border-color:var(--store)}.ib-info{background:var(--blue-l);border-color:var(--blue)}
.ib-title{font-size:12.5px;font-weight:700;margin-bottom:3px}
.ib-desc{font-size:12px;color:var(--text2);line-height:1.7}
.pdf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;display:none;align-items:center;justify-content:center}
.pdf-overlay.open{display:flex}
.pdf-modal{background:var(--white);border-radius:var(--radius);width:90vw;max-width:900px;max-height:90vh;overflow-y:auto}
.pdf-header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius) var(--radius) 0 0}
.pdf-body{padding:24px}
.pdf-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* в•җв•җв•җв•җ TOAST / MODAL в•җв•җв•җв•җ */
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:11px 16px;border-radius:var(--rsm);font-size:13px;font-weight:500;box-shadow:var(--shm);z-index:9999;display:none;align-items:center;gap:8px;max-width:320px}
.toast.show{display:flex;animation:toastIn .25s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius);padding:24px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:15px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.empty{text-align:center;padding:32px 20px;color:var(--text3)}
.empty .ei{font-size:30px;margin-bottom:8px}
canvas{max-height:210px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

@media(max-width:1100px){
  .kpi6{grid-template-columns:repeat(2,1fr)}
  .row2{grid-template-columns:1fr}
  .cl-grid{grid-template-columns:1fr 1fr}
  .cal-layout{grid-template-columns:1fr}
  .rpt-kpi-row{grid-template-columns:repeat(3,1fr)}
  .rpt-compare{grid-template-columns:1fr}
  .monthly-grid{grid-template-columns:repeat(4,1fr)}
}
/* в•җв•җв•җв•җ CAL к°ңм„  в•җв•җв•җв•җ */
.cal-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.cal-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--sh)}
.ev-panel{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--sh)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{min-height:52px;padding:6px 4px}
.ev-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:520px}
/* в•җв•җв•җв•җ DATE PICKER DROPDOWN в•җв•җв•җв•җ */
.date-picker-wrap{position:relative;display:inline-block}
.date-picker-btn{display:flex;align-items:center;gap:8px;padding:7px 16px;border:1.5px solid var(--border);border-radius:24px;background:var(--white);font-size:12.5px;font-weight:600;color:var(--text2);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .2s;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.date-picker-btn:hover{border-color:var(--blue);color:var(--blue);box-shadow:0 2px 8px rgba(59,130,246,.15)}
.date-picker-btn.open{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.date-picker-btn .dp-arrow{font-size:10px;opacity:.5;transition:transform .2s;margin-left:2px}
.date-picker-btn.open .dp-arrow{transform:rotate(180deg)}
.date-picker-dropdown{position:absolute;top:calc(100% + 10px);left:0;z-index:600;background:var(--white);border:1.5px solid var(--border);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.14);display:none;animation:fadeIn .15s ease;overflow:hidden}
.date-picker-dropdown.open{display:flex}
.dp-left{width:160px;background:var(--surface);padding:12px 8px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.dp-left-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;padding:4px 8px 8px}
.dp-preset{padding:8px 12px;border-radius:8px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .12s;border:none;background:transparent;text-align:left;font-family:'Noto Sans KR',sans-serif;width:100%}
.dp-preset:hover{background:var(--blue-l);color:var(--blue)}
.dp-preset.active{background:var(--blue);color:#fff;font-weight:700}
.dp-right{padding:16px;min-width:480px}
.dp-right-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dp-range-display{display:flex;align-items:center;gap:8px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text2)}
.dp-range-val{padding:5px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);min-width:90px;text-align:center;font-weight:600}
.dp-range-val.selecting{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.dp-range-arrow{color:var(--text3);font-size:14px}
.dp-calendars{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dp-cal{min-width:200px}
.dp-cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dp-cal-title{font-size:13px;font-weight:700;color:var(--text)}
.dp-cal-nav{display:flex;gap:4px}
.dp-cal-nav button{width:26px;height:26px;border:1.5px solid var(--border);border-radius:6px;background:var(--white);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--text2)}
.dp-cal-nav button:hover{border-color:var(--blue);color:var(--blue)}
.dp-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--text3);padding:4px 0;font-family:'IBM Plex Mono',monospace}
.dp-day{text-align:center;padding:5px 2px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .12s;border:none;background:transparent;width:100%}
.dp-day:hover:not(.dp-day-empty):not(.dp-day-disabled){background:var(--blue-l);color:var(--blue)}
.dp-day.today{font-weight:700;color:var(--blue)}
.dp-day.selected-start,.dp-day.selected-end{background:var(--blue)!important;color:#fff!important;border-radius:6px;font-weight:700}
.dp-day.in-range{background:var(--blue-m);color:var(--blue);border-radius:0}
.dp-day.selected-start{border-radius:6px 0 0 6px}
.dp-day.selected-end{border-radius:0 6px 6px 0}
.dp-day.selected-start.selected-end{border-radius:6px}
.dp-day-empty{cursor:default;color:var(--text3);opacity:.3}
.dp-day-other{color:var(--text3)}
.dp-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.dp-btn-cancel{padding:7px 16px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s}
.dp-btn-cancel:hover{border-color:var(--red);color:var(--red)}
.dp-btn-apply{padding:7px 20px;border:none;border-radius:8px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s}

  const id = document.getElementById('lid').value.trim();
  const pw = document.getElementById('lpw').value.trim();
  const errEl = document.getElementById('lerr');
  
  if(!id || !pw){
    errEl.textContent = "м•„мқҙл””мҷҖ л№„л°ҖлІҲнҳёлҘј лӘЁл‘җ мһ…л Ҙн•ҙмЈјм„ёмҡ”.";

          }

          const row = rows[0];

              pw: row.password,
              role: 'client',

              manager: row.manager || '',
              url: row.store_url || '',

            if(!ACCOUNTS.find(a => a.id === acc.id)) ACCOUNTS.push(acc);

/* в”Җв”Җ Supabase кі„м • лӘ©лЎқ лЎңл“ң в”Җв”Җ */
async function loadClientsFromSupabase(){
  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/clients?select=*&order=created_at.desc`,
      {headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}}
    );
    const rows = await res.json();
    if(!Array.isArray(rows)||!rows.length) return;

    // ACCOUNTSлҘј Supabase лҚ°мқҙн„° кё°мӨҖмңјлЎң мҷ„м „нһҲ мһ¬кө¬м„ұ (кҙҖлҰ¬мһҗ кі„м •л§Ң мң м§Җ)
    const adminAcc = ACCOUNTS.find(a=>a.role==='admin');
    ACCOUNTS.length = 0;
    if(adminAcc) ACCOUNTS.push(adminAcc);

    rows.forEach(row=>{
      if(row.client_key==='dearcompany') return;
      ACCOUNTS.push({
        id:             row.client_key,
        pw:             row.password,
        role:           'client',
        name:           row.company_name,
        company:        row.company_name,
        manager:        row.manager        || '',
        url:            row.store_url      || '',
        memo:           row.memo           || '',
        naver_search_id: row.naver_search_id || '',
        naver_gfa_id:    row.naver_gfa_id    || '',
      });
    });

    // кҙҖлҰ¬мһҗ нҷ”л©ҙмқҙл©ҙ н…Ңмқҙлё”л§Ң к°ұмӢ 
    if(typeof renderAdminTable === 'function'){
      renderAdminTable();
    }
    console.log(`вң… кі„м • ${rows.length}к°ң лЎңл“ңлҗЁ`);
  }catch(e){
    console.warn('кі„м • лӘ©лЎқ лЎңл“ң мӢӨнҢЁ:', e);
  }
}

/* в•җв•җв•җв•җ DATE PICKER в•җв•җв•җв•җ */
let dpState = { start: null, end: null, selecting: false, viewYear1: 2026, viewMonth1: 1, viewYear2: 2026, viewMonth2: 2 };

function toggleDatePicker(){
  const dd = document.getElementById('datePickerDropdown');
  const btn = document.getElementById('datePickerBtn');
  if(!dd) return;
  const isOpen = dd.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  if(isOpen){
    // нҳ„мһ¬ м„ нғқ кё°к°„мңјлЎң мҙҲкё°нҷ”
    const from = currentDateRange?.from;
    const to   = currentDateRange?.to;
    if(from && to){
      dpState.start = from;
      dpState.end   = to;
      const d1 = new Date(from);
      dpState.viewYear1  = d1.getFullYear();
      dpState.viewMonth1 = d1.getMonth();
      const d2 = new Date(to);
      dpState.viewYear2  = d2.getFullYear();
      dpState.viewMonth2 = d2.getMonth();
      // к°ҷмқҖ лӢ¬мқҙл©ҙ л‘җлІҲм§ё лӢ¬л ҘмқҖ лӢӨмқҢлӢ¬
      if(dpState.viewYear1===dpState.viewYear2 && dpState.viewMonth1===dpState.viewMonth2){
        dpState.viewMonth2++;
        if(dpState.viewMonth2>11){dpState.viewMonth2=0;dpState.viewYear2++;}
      }
    }
    dpUpdateDisplay();
    dpRenderCals();
  }
}

function closeDatePicker(){
  const dd = document.getElementById('datePickerDropdown');
  const btn = document.getElementById('datePickerBtn');
  if(dd) dd.classList.remove('open');
  if(btn) btn.classList.remove('open');
}

function dpUpdateDisplay(){
  const fmt = s => s ? s.replace(/-/g,'.').slice(0,10) : 'вҖ”';
  const sv = document.getElementById('dpStartVal');
  const ev = document.getElementById('dpEndVal');
  if(sv) sv.textContent = fmt(dpState.start);
  if(ev) ev.textContent = fmt(dpState.end);
  if(sv) sv.classList.toggle('selecting', !dpState.start || dpState.selecting);
  if(ev) ev.classList.toggle('selecting', dpState.start && dpState.selecting);
}

function dpRenderCals(){
  dpRenderCal('dpCal1', dpState.viewYear1, dpState.viewMonth1, 1);
  dpRenderCal('dpCal2', dpState.viewYear2, dpState.viewMonth2, 2);
}

function dpRenderCal(elId, year, month, calNum){
  const el = document.getElementById(elId);
  if(!el) return;
  const months = ['1мӣ”','2мӣ”','3мӣ”','4мӣ”','5мӣ”','6мӣ”','7мӣ”','8мӣ”','9мӣ”','10мӣ”','11мӣ”','12мӣ”'];
  const dows = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];
  const today = new Date().toISOString().slice(0,10);
  const fmt = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  let html = `
    <div class="dp-cal-hd">
      <div class="dp-cal-title">${year}л…„ ${months[month]}</div>
      <div class="dp-cal-nav">
        ${calNum===1 ? `<button onclick="dpNavMonth(1,-1)">вҖ№</button>` : `<button onclick="dpNavMonth(2,-1)">вҖ№</button>`}
        ${calNum===1 ? `<button onclick="dpNavMonth(1,1)">вҖә</button>` : `<button onclick="dpNavMonth(2,1)">вҖә</button>`}
      </div>
    </div>
    <div class="dp-cal-grid">
      ${dows.map(d=>`<div class="dp-dow">${d}</div>`).join('')}`;

  const first = new Date(year, month, 1);
  const startDay = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();

  for(let i=0; i<startDay; i++){
    html += `<button class="dp-day dp-day-empty dp-day-other">${prevDays-startDay+i+1}</button>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = fmt(year, month, d);
    const isToday = dateStr === today;
    const isStart = dateStr === dpState.start;
    const isEnd   = dateStr === dpState.end;
    const inRange = dpState.start && dpState.end && dateStr > dpState.start && dateStr < dpState.end;
    let cls = 'dp-day';
    if(isToday) cls += ' today';
    if(isStart) cls += ' selected-start';
    if(isEnd)   cls += ' selected-end';
    if(inRange) cls += ' in-range';
    html += `<button class="${cls}" onclick="dpClickDay('${dateStr}')">${d}</button>`;
  }
  const total = startDay + daysInMonth;
  const remain = total%7===0 ? 0 : 7-(total%7);
  for(let i=1; i<=remain; i++){
    html += `<button class="dp-day dp-day-empty dp-day-other">${i}</button>`;
  }
  html += `</div>`;
  el.innerHTML = html;
}

function dpNavMonth(calNum, dir){
  event.stopPropagation();
  if(calNum===1){
    dpState.viewMonth1 += dir;
    if(dpState.viewMonth1>11){dpState.viewMonth1=0;dpState.viewYear1++;}
    if(dpState.viewMonth1<0){dpState.viewMonth1=11;dpState.viewYear1--;}
  } else {
    dpState.viewMonth2 += dir;
    if(dpState.viewMonth2>11){dpState.viewMonth2=0;dpState.viewYear2++;}
    if(dpState.viewMonth2<0){dpState.viewMonth2=11;dpState.viewYear2--;}
  }
  dpRenderCals();
}

function dpClickDay(dateStr){
  event.stopPropagation();
  if(!dpState.start || dpState.end){
    // мғҲлЎң мӢңмһ‘
    dpState.start = dateStr;
    dpState.end   = null;
    dpState.selecting = true;
  } else {
    // мў…лЈҢмқј м„ нғқ
    if(dateStr < dpState.start){
      dpState.end   = dpState.start;
      dpState.start = dateStr;
    } else {
      dpState.end = dateStr;
    }
    dpState.selecting = false;
  }
  dpUpdateDisplay();
  dpRenderCals();
  // н”„лҰ¬м…Ӣ нҷңм„ұ н•ҙм ң
  document.querySelectorAll('.dp-preset').forEach(b=>b.classList.remove('active'));
}

function dpSetPreset(type){
  event?.stopPropagation();
  const today = new Date();
  let from, to;
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(type==='today'){from=to=new Date();}
  else if(type==='yesterday'){const y=new Date(today);y.setDate(y.getDate()-1);from=to=y;}
  else if(type==='thisweek'){const d=new Date(today);d.setDate(d.getDate()-d.getDay()+1);from=d;to=new Date();}
  else if(type==='lastweek'){const e=new Date(today);e.setDate(e.getDate()-e.getDay());const s=new Date(e);s.setDate(e.getDate()-6);from=s;to=e;}
  else if(type==='thismonth'){from=new Date(today.getFullYear(),today.getMonth(),1);to=new Date();}
  else if(type==='lastmonth'){from=new Date(today.getFullYear(),today.getMonth()-1,1);to=new Date(today.getFullYear(),today.getMonth(),0);}
  else if(type==='last7'){const d=new Date(today);d.setDate(d.getDate()-7);from=d;to=new Date();}
  else if(type==='last30'){const d=new Date(today);d.setDate(d.getDate()-30);from=d;to=new Date();}
  else if(type==='last90'){const d=new Date(today);d.setDate(d.getDate()-90);from=d;to=new Date();}
  dpState.start = fmt(from);
  dpState.end   = fmt(to);
  dpState.selecting = false;
  // лӢ¬л Ҙ мқҙлҸҷ
  const d1 = new Date(dpState.start);
  dpState.viewYear1=d1.getFullYear(); dpState.viewMonth1=d1.getMonth();
  const d2 = new Date(dpState.end);
  dpState.viewYear2=d2.getFullYear(); dpState.viewMonth2=d2.getMonth();
  if(dpState.viewYear1===dpState.viewYear2 && dpState.viewMonth1===dpState.viewMonth2){
    dpState.viewMonth2++; if(dpState.viewMonth2>11){dpState.viewMonth2=0;dpState.viewYear2++;}
  }
  dpUpdateDisplay();
  dpRenderCals();
  // нҷңм„ұ н”„лҰ¬м…Ӣ
  document.querySelectorAll('.dp-preset').forEach(b=>b.classList.remove('active'));
  event?.target?.classList.add('active');
}

function dpApply(){
  if(!dpState.start || !dpState.end){
    toast('вҡ пёҸ мӢңмһ‘мқјкіј мў…лЈҢмқјмқ„ лӘЁл‘җ м„ нғқн•ҙмЈјм„ёмҡ”'); return;
  }
  currentDateRange = {from: dpState.start, to: dpState.end};
  
  // м¶”к°Җ: м„ём…ҳ мҠӨнҶ лҰ¬м§Җм—җ лӮ м§ң м ҖмһҘ
  sessionStorage.setItem('currentDateRange', JSON.stringify(currentDateRange));
  
  const disp = s => s.replace(/-/g,'.').slice(0,10);
  document.getElementById('drangeLabel').textContent = `${disp(dpState.start)} ~ ${disp(dpState.end)}`;
  closeDatePicker();
  toast('рҹ“… кё°к°„мқҙ ліҖкІҪлҗҳм—ҲмҠөлӢҲлӢӨ');

}

async function refreshDashboard(){
  const activePage = sessionStorage.getItem('currentPage') || 'combined';
  if(!['combined','naver'].includes(activePage)) return;
  const c = document.getElementById('appContent');
  if(!c) return;
  const d = await fetchReportData(currentReportMonth);
  if(d) REPORT_DATA[currentReportMonth] = d;

  if(activePage==='combined'){
    c.innerHTML=htmlCombined();
    setTimeout(renderCharts,50);
  }
  if(activePage==='naver'){
    // нҳ„мһ¬ м„ нғқлҗң нғӯ м ҖмһҘ нӣ„ ліөмӣҗ
    const savedTab = sessionStorage.getItem('currentNaverTab') || 'summary';
    c.innerHTML=htmlNaver();
    setTimeout(()=>{
      const tabEl = document.querySelector(`.nav-tab[onclick*="switchNaverTab('${savedTab}'"]`);
      switchNaverTab(savedTab, tabEl);
      renderCharts();
    },50);
  }
}
async function fetchReportData(month){
  try{
    const isAdmin      = currentUser?.role==='admin';
    const targetClient = isAdmin ? (activeClientId||'') : (currentUser?.id||'');
    if(!targetClient) return null;
    const fromDate = currentDateRange?.from || (month+'-01');
    const toDate   = currentDateRange?.to   || (month+'-31');
    const h={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY};
    const [dailyRes,kwRes,hourlyRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/daily_reports?client_key=eq.${targetClient}&date=gte.${fromDate}&date=lte.${toDate}&select=*&limit=5000`,{headers:h}),
      fetch(`${SUPABASE_URL}/rest/v1/keyword_reports?client_key=eq.${targetClient}&month=eq.${month}&select=*&limit=5000`,{headers:h}),
      fetch(`${SUPABASE_URL}/rest/v1/hourly_reports?client_key=eq.${targetClient}&month=eq.${month}&select=*&limit=5000`,{headers:h}),
    ]);
    const dailyArr  = await dailyRes.json().then(r=>Array.isArray(r)?r:[]);
    const kwArr     = await kwRes.json().then(r=>Array.isArray(r)?r:[]);
    const hourlyArr = await hourlyRes.json().then(r=>Array.isArray(r)?r:[]);
    const sum=(arr,key)=>arr.reduce((s,r)=>s+(+r[key]||0),0);
    const totalImp=sum(dailyArr,'imp'), totalClick=sum(dailyArr,'click'), totalCost=sum(dailyArr,'cost');
    const totalConv=sum(dailyArr,'conv'), totalRev=sum(dailyArr,'rev');
    const totalPurchaseConv=sum(dailyArr,'purchase_conv'), totalPurchaseRev=sum(dailyArr,'purchase_rev');
    const totalCartRev=sum(dailyArr,'cart_rev');
    function calcMetrics(imp,click,cost,conv,rev){
      imp=+imp||0;click=+click||0;cost=+cost||0;conv=+conv||0;rev=+rev||0;
      return {imp,click,cost,conv,rev,
        roas:cost>0?rev/cost*100:0, ctr:imp>0?click/imp*100:0, cpc:click>0?cost/click:0,
        cvr:click>0?conv/click*100:0, cpa:conv>0?cost/conv:0, roi:cost>0?(rev-cost)/cost*100:0};
    }
    const chMap={};
    dailyArr.forEach(r=>{
      const key=`${r.campaign_type||''} (${r.device||''})`;
      if(!chMap[key]) chMap[key]={name:key,imp:0,click:0,cost:0,conv:0,rev:0};
      chMap[key].imp+=+r.imp||0; chMap[key].click+=+r.click||0;
      chMap[key].cost+=+r.cost||0; chMap[key].conv+=+r.conv||0; chMap[key].rev+=+r.rev||0;
    });
    const channels=Object.values(chMap).map(c=>({...c,...calcMetrics(c.imp,c.click,c.cost,c.conv,c.rev)})).sort((a,b)=>b.cost-a.cost);
    const weekMap={};
    dailyArr.forEach(r=>{
      const day=new Date(r.date).getDate();
      const wk=day<=7?'1мЈј':day<=14?'2мЈј':day<=21?'3мЈј':'4мЈј';
      if(!weekMap[wk]) weekMap[wk]={week:wk,imp:0,click:0,cost:0,conv:0,rev:0};
      weekMap[wk].imp+=+r.imp||0; weekMap[wk].click+=+r.click||0;
      weekMap[wk].cost+=+r.cost||0; weekMap[wk].conv+=+r.conv||0; weekMap[wk].rev+=+r.rev||0;
    });
    const weekly=['1мЈј','2мЈј','3мЈј','4мЈј'].map(w=>weekMap[w]||{week:w,imp:0,click:0,cost:0,conv:0,rev:0});
    const hourMap={};
    hourlyArr.forEach(r=>{
      const t=r.time_slot||'';
      if(!hourMap[t]) hourMap[t]={time:t,click:0,cost:0,conv:0,rev:0};
      hourMap[t].click+=+r.click||0; hourMap[t].cost+=+r.cost||0;
      hourMap[t].conv+=+r.conv||0; hourMap[t].rev+=+r.rev||0;
    });
    const hourly=Object.values(hourMap).map(h=>({...h,pct:totalClick>0?h.click/totalClick:0}));
    const kwMap={};
    kwArr.forEach(r=>{
      const key=`${r.keyword}__${r.campaign_type}__${r.device}`;
      if(!kwMap[key]) kwMap[key]={keyword:r.keyword,type:r.campaign_type,device:r.device,cost:0,click:0,conv:0,rev:0};
      kwMap[key].cost+=+r.cost||0; kwMap[key].click+=+r.click||0;
      kwMap[key].conv+=+r.conv||0; kwMap[key].rev+=+r.rev||0;
    });
    const topKeywords=Object.values(kwMap).map(k=>({...k,...calcMetrics(k.imp,k.click,k.cost,k.conv,k.rev)})).sort((a,b)=>b.rev-a.rev||b.cost-a.cost).slice(0,20);
    const dailyMap={};
    dailyArr.forEach(r=>{
      const d=r.date||''; if(!d) return;
      if(!dailyMap[d]) dailyMap[d]={date:d,imp:0,click:0,cost:0,conv:0,rev:0};
      dailyMap[d].imp+=+r.imp||0; dailyMap[d].click+=+r.click||0;
      dailyMap[d].cost+=+r.cost||0; dailyMap[d].conv+=+r.conv||0; dailyMap[d].rev+=+r.rev||0;
    });
    const dailyList=Object.values(dailyMap).sort((a,b)=>a.date.localeCompare(b.date));
    const dowMap={0:{day:'мқј',imp:0,click:0,cost:0,conv:0,rev:0},1:{day:'мӣ”',imp:0,click:0,cost:0,conv:0,rev:0},2:{day:'нҷ”',imp:0,click:0,cost:0,conv:0,rev:0},3:{day:'мҲҳ',imp:0,click:0,cost:0,conv:0,rev:0},4:{day:'лӘ©',imp:0,click:0,cost:0,conv:0,rev:0},5:{day:'кёҲ',imp:0,click:0,cost:0,conv:0,rev:0},6:{day:'нҶ ',imp:0,click:0,cost:0,conv:0,rev:0}};
    dailyArr.forEach(r=>{
      if(!r.date) return;
      const dow=new Date(r.date).getDay();
      dowMap[dow].imp+=+r.imp||0; dowMap[dow].click+=+r.click||0;
      dowMap[dow].cost+=+r.cost||0; dowMap[dow].conv+=+r.conv||0; dowMap[dow].rev+=+r.rev||0;
    });
    const dowList=Object.values(dowMap);
    const pcArr=dailyArr.filter(r=>(r.device||'').includes('PC'));
    const moArr=dailyArr.filter(r=>(r.device||'').toLowerCase().includes('лӘЁл°”мқј')||(r.device||'').toLowerCase().includes('mobile'));
    const pcCost=sum(pcArr,'cost'),moCost=sum(moArr,'cost');
    const pcConv=sum(pcArr,'conv'),moConv=sum(moArr,'conv');
    const pcRev=sum(pcArr,'rev'),moRev=sum(moArr,'rev');
    const m0=calcMetrics(totalImp,totalClick,totalCost,totalConv,totalRev);
    const {roas,ctr,cpc,cvr,cpa,roi}=m0;
    const acc=ACCOUNTS.find(a=>a.id===targetClient);
    const [y,mn]=month.split('-');
    const periodLabel=currentDateRange?.from
      ?`${currentDateRange.from} ~ ${currentDateRange.to}`
      :`${y}л…„ ${parseInt(mn)}мӣ”`;
    return {
      client:targetClient, period:periodLabel, manager:acc?.manager||'вҖ”',
      kpi:{totalImp,totalClick,totalCost,totalConv,totalRev,totalPurchaseConv,totalPurchaseRev,totalCartRev,roas,ctr,cpc,cvr,cpa,roi},
      mom:{click:0,cost:0,rev:0,roas:0},
      channels, weekly, hourly, topKeywords, insights:[],
      dailyList, dowList,
      device:{pcCost,moCost,pcConv,moConv,pcRev,moRev},
    };
  }catch(e){
    console.warn('лҚ°мқҙн„° м§‘кі„ мӢӨнҢЁ:',e);
    return null;
  }
}

    });
    const rows = await res.json();
    if(!Array.isArray(rows)||!rows.length) return;

    // MONTHLY_TREND м—…лҚ°мқҙнҠё
    rows.forEach(r=>{
      const exists = MONTHLY_TREND.find(t=>t.month===r.month);
      const label = r.period_label ? r.period_label.replace('л…„ ','л…„').replace('мӣ”','мӣ”') : r.month;
      if(!exists){
        MONTHLY_TREND.push({month:r.month, label:label.slice(-3), roas:+(r.roas||0), cost:r.total_cost||0, rev:r.total_rev||0});
      } else {
        exists.roas = +(r.roas||0);
        exists.cost = r.total_cost||0;
        exists.rev  = r.total_rev||0;
      }
    });
    MONTHLY_TREND.sort((a,b)=>a.month.localeCompare(b.month));

    // мӣ” м„ нғқ л“ңлЎӯлӢӨмҡҙ м—…лҚ°мқҙнҠё
    const sel = document.getElementById('reportMonthSel');
    if(sel){
      const allMonths = [...new Set([...Object.keys(REPORT_DATA), ...rows.map(r=>r.month)])].sort().reverse();
      sel.innerHTML = allMonths.map(m=>{
        const d = REPORT_DATA[m] || rows.find(r=>r.month===m);
        const label = d?.period_label || d?.period || m.replace('-','л…„ ')+'мӣ”';
        return `<option value="${m}" ${m===currentReportMonth?'selected':''}>${label}</option>`;
      }).join('');
    }

    // нҠёл Ңл“ң pill мғҲлЎңкі м№Ё
    const trendEl = document.querySelector('.monthly-grid');
    if(trendEl){
      trendEl.innerHTML = MONTHLY_TREND.map(t=>{
        const active = t.month===currentReportMonth;
        const rc = t.roas>=5?'color:var(--naver)':t.roas>=3?'color:var(--gold)':'color:var(--red)';
        return `<div class="month-pill ${active?'mp-active':''}" onclick="switchReportMonth('${t.month}')">
          <div class="mp-mo">${t.label}</div>
          <div class="mp-roas" style="${active?'':rc}">${t.roas.toFixed(1)}x</div>
        </div>`;
      }).join('');
    }
  }catch(e){
    console.warn('мӣ”лі„ нҠёл Ңл“ң лЎңл“ң мӢӨнҢЁ:', e);
  }
}

    if(targetClient) url += `&client_key=eq.${targetClient}`;

      wrap.innerHTML=`<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">м—…лЎңл“ң мқҙл Ҙмқҙ м—ҶмҠөлӢҲлӢӨ</div>`;

      daily:'рҹ“… мқјлі„', keyword:'рҹ”‘ нӮӨмӣҢл“ң', hourly:'рҹ•җ мӢңк°„лҢҖлі„',

    };

    const rows = logs.map(log=>{
      const dt = new Date(log.uploaded_at);
      const dateStr = `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;

      // JSONмңјлЎң м§Ғл ¬нҷ”н•ҙм„ң onclickм—җ м•Ҳм „н•ҳкІҢ м „лӢ¬
      const logJson = encodeURIComponent(JSON.stringify({
        id: log.id,

      return `

function downloadUploadLog(fileName){
  // нҳ„мһ¬ м„ём…ҳмқҳ uploadedFilesм—җм„ң м°ҫм•„м„ң лӢӨмҡҙлЎңл“ң
  const f = uploadedFiles.find(u=>u.name===fileName);
  if(f&&f.file){
    const url = URL.createObjectURL(f.file);
    const a = document.createElement('a');
    a.href=url; a.download=fileName; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  } else {
    // м„ём…ҳм—җ м—Ҷмңјл©ҙ нҢҢмқјлӘ… нҒҙлҰҪліҙл“ң ліөмӮ¬
    navigator.clipboard?.writeText(fileName).then(()=>{
      toast(`рҹ“Ӣ "${fileName}" нҢҢмқјлӘ…мқҙ ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ. нҢҢмқјмқ„ лӢӨмӢң м—…лЎңл“ңн•ҳл©ҙ лӢӨмҡҙлЎңл“ң к°ҖлҠҘн•©лӢҲлӢӨ.`);
    }).catch(()=>{
      toast(`в„№пёҸ "${fileName}" вҖ” нҢҢмқјмқ„ лӢӨмӢң м—…лЎңл“ңн•ҳл©ҙ м—ҙлһҢ к°ҖлҠҘн•©лӢҲлӢӨ.`);
    });
  }
}

async function deleteUploadLog(logStr){
  const log = JSON.parse(logStr);
  const h = {
    'apikey':SUPABASE_ANON_KEY,
    'Authorization':'Bearer '+SUPABASE_ANON_KEY,
    'Content-Type':'application/json'
  };
  const tableMap = {
    daily:         'daily_reports',
    keyword:       'keyword_reports',
    hourly:        'hourly_reports',
    gfa_daily:     'gfa_reports',
    gfa_placement: 'gfa_reports',
  };
  const dataTable = tableMap[log.file_type];

  toast('рҹ—‘ мӮӯм ң мӨ‘...');
  closeModal();

  try{
    // 1. Supabase мӢӨм ң лҚ°мқҙн„° мӮӯм ң
    if(dataTable && log.client_key && log.month){
      let delUrl = `${SUPABASE_URL}/rest/v1/${dataTable}?client_key=eq.${log.client_key}&month=eq.${log.month}`;
      // GFAлҠ” мқјлі„/л§ӨмІҙлі„ кө¬л¶„
      if(log.file_type==='gfa_daily')     delUrl += '&date=not.is.null';
      if(log.file_type==='gfa_placement') delUrl += '&date=is.null';
      await fetch(delUrl,{method:'DELETE',headers:h});
    }

    // 2. upload_logs мқҙл Ҙ мӮӯм ң
    await fetch(`${SUPABASE_URL}/rest/v1/upload_logs?id=eq.${log.id}`,{
      method:'DELETE', headers:h
    });

    toast(`вң… "${log.file_name}" мӮӯм ң мҷ„лЈҢ`);
    // лӘ©лЎқ мғҲлЎңкі м№Ё
    const selClient = document.getElementById('filterClient2')?.value || '';
    loadUploadLogs(selClient);

  }catch(e){
    toast(`вқҢ мӮӯм ң мӢӨнҢЁ: ${e.message}`);
  }
}

function handleDrop(e){
  e.preventDefault();
  const dz=document.getElementById('dropZone');
  if(dz){dz.style.borderColor='var(--border2)';dz.style.background='var(--surface)';}
  addFilesToQueue(e.dataTransfer.files);
}
function handleFileSelect(input){addFilesToQueue(input.files);}

function addFilesToQueue(files){
  const today=new Date().toISOString().split('T')[0];
  Array.from(files).forEach(f=>{
    uploadedFiles.unshift({
      id:Date.now()+Math.random(),
      name:f.name, file:f, date:today,
      size:f.size>1048576?(f.size/1048576).toFixed(1)+' MB':(f.size/1024).toFixed(0)+' KB',
      status:'лҢҖкё°мӨ‘'
    });
  });
  renderUploadTab();
  toast(`рҹ“Һ ${files.length}к°ң нҢҢмқј м¶”к°ҖлҗЁ вҖ” [м „мІҙ л“ұлЎқ] лІ„нҠјмқ„ лҲҢлҹ¬ м ҖмһҘн•ҳм„ёмҡ”`);
}

function detectClientFromFile(file){
  const fileName = file.name.toLowerCase().replace(/[_\-\s]/g,'');
  const clients  = ACCOUNTS.filter(a=>a.role==='client');
  const matched  = clients.find(a=>
    fileName.includes(a.id.toLowerCase()) ||
    fileName.includes(a.company.toLowerCase().replace(/[\s_\-]/g,'')) ||
    (a.memo && fileName.includes(a.memo.toLowerCase().replace(/[\s_\-]/g,'')))
  );
  return matched ? matched.id : null;
}

async function saveAllFiles() {
  const clientEl    = document.getElementById('uploadClient');
  const manualClient = currentUser.role==='admin' ? (clientEl ? clientEl.value : '') : currentUser.id;
  const pending     = uploadedFiles.filter(f => f.status==='лҢҖкё°мӨ‘');
  if(!pending.length){ toast('вҡ пёҸ лҢҖкё°мӨ‘мқё нҢҢмқјмқҙ м—ҶмҠөлӢҲлӢӨ'); return; }

  toast(`рҹ”Қ нҢҢмқј м—…мІҙ нҷ•мқё мӨ‘...`);
  const blocked  = [];
  const approved = [];

  for(let i=0; i<pending.length; i++){
    const f = pending[i];
    let client = null;

    if(currentUser.role==='admin'){
      const detected = detectClientFromFile(f.file);
      if(detected){
        client = detected;
        const c = ACCOUNTS.find(a=>a.id===detected);
        toast(`рҹҺҜ ${f.name} вҶ’ ${c?.company||detected} мһҗлҸҷ мқёмӢқ`);
      } else if(manualClient){
        client = manualClient;
      }
    } else {
      client = currentUser.id;
    }

    if(!client){
      f.status = 'м ҖмһҘмӢӨнҢЁ';
      blocked.push(f.name);
    } else {
      approved.push({f, client});
    }
  }

  if(blocked.length){
    renderUploadTab();
    toast(`рҹҡ« м—…мІҙ лҜёмқёмӢқ ${blocked.length}к°ң м°ЁлӢЁ вҖ” нҢҢмқјлӘ…м—җ м—…мІҙлӘ…мқ„ нҸ¬н•Ён•ҳкұ°лӮҳ л“ңлЎӯлӢӨмҡҙм—җм„ң м—…мІҙлҘј м„ нғқн•ҙмЈјм„ёмҡ”`);
  }

  approved.forEach(({f, client}, i) => {
    setTimeout(() => saveOneFile(f, client), i * 2000);
  });
}

function saveOneFile(fileObj, client) {
  const ext = fileObj.name.split('.').pop().toLowerCase();
  fileObj.status = 'м ҖмһҘмӨ‘';
  renderUploadTab();

  /* в”Җв”Җ CSV в”Җв”Җ */
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const text = e.target.result.replace(/^\uFEFF/, ''); // BOM м ңкұ°
        const lines = text.split(/\r?\n/);

        // в‘  н—ӨлҚ” н–ү мһҗлҸҷ нғҗмғү (мөңлҢҖ 10н–ү лӮҙм—җм„ң)
        let headerIdx = -1, cols = [];
        const TARGET_COLS = ['мқјлі„','мӢңк°„лҢҖлі„','кІҖмғүм–ҙ','нӮӨмӣҢл“ңлӘ…','нӮӨмӣҢл“ң','кІҢмһ¬ мң„м№ҳ','кҙ‘кі  кі„м • мқҙлҰ„','кё°к°„','мә нҺҳмқёмң нҳ•','PC/лӘЁл°”мқј л§ӨмІҙ'];
        for (let i = 0; i < Math.min(lines.length, 20); i++) {
          const c = csvParseLine(lines[i]);
          if (c.some(x => TARGET_COLS.includes(x.trim()))) {
            headerIdx = i; cols = c.map(x => x.trim()); break;
          }
        }
        if (headerIdx === -1) {
          fileObj.status = 'м ҖмһҘмӢӨнҢЁ'; renderUploadTab();
          toast(`вҡ пёҸ ${fileObj.name} вҖ” н—ӨлҚ” мқёмӢқ мӢӨнҢЁ\n(мқјлі„/мӢңк°„лҢҖлі„/кІҖмғүм–ҙ м»¬лҹјмқҙ м—ҶмҠөлӢҲлӢӨ)`);
          console.warn('CSV н—ӨлҚ” нғҗмғү мӢӨнҢЁ. мІ« 5н–ү:', lines.slice(0,5));
          return;
        }

        // в‘Ў лӮ м§ң(мӣ”) м¶”м¶ң: н—ӨлҚ” мң„мӘҪ н–үм—җм„ң лӮ м§ң нҢЁн„ҙ кІҖмғү
        let month = new Date().toISOString().slice(0, 7);
        for (let i = 0; i < headerIdx; i++) {
          const m1 = lines[i].match(/(\d{4})[\.\-](\d{2})[\.\-]\d{2}/);
          if (m1) { month = `${m1[1]}-${m1[2]}`; break; }
          const m2 = lines[i].match(/(\d{4})л…„\s*(\d{1,2})мӣ”/);
          if (m2) { month = `${m2[1]}-${m2[2].padStart(2,'0')}`; break; }
        }

        const hasDaily    = cols.includes('мқјлі„');
        const hasHourly   = cols.includes('мӢңк°„лҢҖлі„');
        const hasKeyword  = cols.some(c => ['кІҖмғүм–ҙ','нӮӨмӣҢл“ңлӘ…','нӮӨмӣҢл“ң'].includes(c));
        const hasGFA      = cols.includes('кІҢмһ¬ мң„м№ҳ') || (cols.includes('кё°к°„') && cols.includes('кҙ‘кі  кі„м • мқҙлҰ„'));
        const hasCampaign = cols.includes('мә нҺҳмқёмң нҳ•') && cols.includes('мә нҺҳмқё');
        const hasDevice   = cols.includes('PC/лӘЁл°”мқј л§ӨмІҙ') && !hasCampaign;
        const kwCol       = cols.find(c => ['кІҖмғүм–ҙ','нӮӨмӣҢл“ңлӘ…','нӮӨмӣҢл“ң'].includes(c)) || 'кІҖмғүм–ҙ';

        const rows = [];
        for (let i = headerIdx + 1; i < lines.length; i++) {
          const line = lines[i];
          if (!line.trim()) continue;
          const vals = csvParseLine(line);
          if (vals.every(v => !v)) continue;

          const row = {};
          cols.forEach((col, idx) => { row[col] = (vals[idx] || '').trim(); });

          if (hasDaily) {
            const rawDate = row['мқјлі„'] || '';
            const dateStr = rawDate.replace(/\./g, '-').replace(/-+$/, '').slice(0, 10);
            if (!dateStr || dateStr.length < 8) continue;
            rows.push({
              data_type: 'daily', client_key: client, month, date: dateStr,
              campaign_type: row['мә нҺҳмқёмң нҳ•'] || '',
              campaign:      row['мә нҺҳмқё'] || '',
              ad_group:      row['кҙ‘кі к·ёлЈ№'] || '',
              keyword:       row['кІҖмғүм–ҙ'] || '',
              device:        row['PC/лӘЁл°”мқј л§ӨмІҙ'] || row['PC/лӘЁл°”мқј'] || '',
              imp:           parseNum(row['л…ём¶ңмҲҳ']),
              click:         parseNum(row['нҒҙлҰӯмҲҳ']),
              ctr:           parseNum(row['нҒҙлҰӯлҘ (%)'] || row['нҒҙлҰӯлҘ '] || 0),
              cpc:           parseNum(row['нҸүк·  CPC'] || row['нҸүк· CPC'] || 0),
              cost:          parseNum(row['мҙқл№„мҡ©(VATнҸ¬н•Ё,мӣҗ)'] || row['мҙқл№„мҡ©(VATнҸ¬н•Ё)'] || row['мҙқл№„мҡ©']),
              conv:          parseNum(row['мҙқ м „нҷҳмҲҳ'] || row['м „нҷҳмҲҳ']),
              direct_conv:   parseNum(row['м§Ғм ‘м „нҷҳмҲҳ'] || 0),
              indirect_conv: parseNum(row['к°„м ‘м „нҷҳмҲҳ'] || 0),
              conv_rate:     parseNum(row['мҙқ м „нҷҳмңЁ(%)'] || row['м „нҷҳмңЁ'] || 0),
              rev:           parseNum(row['мҙқ м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || row['м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || row['м „нҷҳл§Өм¶ңм•Ў']),
              direct_rev:    parseNum(row['м§Ғм ‘м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || 0),
              indirect_rev:  parseNum(row['к°„м ‘м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || 0),
              purchase_conv: parseNum(row['кө¬л§Өмҷ„лЈҢ м „нҷҳмҲҳ'] || 0),
              purchase_rev:  parseNum(row['кө¬л§Өмҷ„лЈҢ м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || 0),
              avg_rank:      parseNum(row['нҸүк· л…ём¶ңмҲңмң„'] || row['нҸүк·  л…ём¶ңмҲңмң„'] || 0),
              roas:          parseNum(row['мҙқ кҙ‘кі мҲҳмқөлҘ (%)'] || row['кҙ‘кі мҲҳмқөлҘ '] || 0),
            });
          } else if (hasHourly) {
            const t = row['мӢңк°„лҢҖлі„'] || '';
            if (!t) continue;
            rows.push({
              data_type: 'hourly', client_key: client, month, time_slot: t,
              campaign_type: row['мә нҺҳмқёмң нҳ•'] || '',
              device: row['PC/лӘЁл°”мқј л§ӨмІҙ'] || row['PC/лӘЁл°”мқј'] || '',
              imp:   parseNum(row['л…ём¶ңмҲҳ']),
              click: parseNum(row['нҒҙлҰӯмҲҳ']),
              cost:  parseNum(row['мҙқл№„мҡ©(VATнҸ¬н•Ё,мӣҗ)'] || row['мҙқл№„мҡ©(VATнҸ¬н•Ё)'] || row['мҙқл№„мҡ©']),
              conv:  parseNum(row['мҙқ м „нҷҳмҲҳ'] || row['м „нҷҳмҲҳ']),
              rev:   parseNum(row['мҙқ м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || row['м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || row['м „нҷҳл§Өм¶ңм•Ў'])
            });
          } else if (hasKeyword) {
            const kw = String(row[kwCol] || '').trim();
            if (!kw) continue;
            // #NAME?, #REF!, #VALUE! л“ұ м—‘м…Җ мҳӨлҘҳк°’ н•„н„°л§Ғ
            if (/^#[A-Z]+[!?]?$/.test(kw) || kw === '#N/A' || kw.startsWith('#')) continue;
            rows.push({
              data_type: 'keyword', client_key: client, month, keyword: String(kw).trim(),
                  campaign_type: row['мң нҳ•'] || row['мә нҺҳмқёмң нҳ•'] || '',
              device: row['PC/лӘЁл°”мқј л§ӨмІҙ'] || row['PC/лӘЁл°”мқј'] || '',
              imp:      parseNum(row['л…ём¶ңмҲҳ']),
              click:    parseNum(row['нҒҙлҰӯмҲҳ']),
              cost:     parseNum(row['мҙқл№„мҡ©(VATнҸ¬н•Ё,мӣҗ)'] || row['мҙқл№„мҡ©(VATнҸ¬н•Ё)'] || row['мҙқл№„мҡ©']),
              avg_rank: parseNum(row['нҸүк· л…ём¶ңмҲңмң„'] || row['нҸүк·  л…ём¶ңмҲңмң„'] || 0),
              conv:     parseNum(row['мҙқ м „нҷҳмҲҳ'] || row['м „нҷҳмҲҳ']),
              rev:      parseNum(row['мҙқ м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || row['м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || row['м „нҷҳл§Өм¶ңм•Ў'])
            });
          }
        }

        // мә нҺҳмқёлі„ нҢҢмӢұ
        if(hasCampaign){
          const campRows = [];
          for(let i = headerIdx+1; i < lines.length; i++){
            const line = lines[i]; if(!line.trim()) continue;
            const vals = csvParseLine(line);
            if(vals.every(v=>!v)) continue;
            const row = {};
            cols.forEach((col,idx)=>{ row[col]=(vals[idx]||'').trim(); });
            campRows.push({
              client_key:    client,
              month,
              campaign_type: row['мә нҺҳмқёмң нҳ•']||'',
              campaign:      row['мә нҺҳмқё']||'',
              device:        'м „мІҙ',
              imp:           parseNum(row['л…ём¶ңмҲҳ']),
              click:         parseNum(row['нҒҙлҰӯмҲҳ']),
              ctr:           parseNum(row['нҒҙлҰӯлҘ (%)']),
              cpc:           parseNum(row['нҸүк·  CPC']),
              cost:          parseNum(row['мҙқл№„мҡ©']),
              conv:          parseNum(row['мҙқ м „нҷҳмҲҳ']),
              conv_rate:     parseNum(row['мҙқ м „нҷҳмңЁ(%)']),
              rev:           parseNum(row['мҙқ м „нҷҳл§Өм¶ңм•Ў(мӣҗ)']||row['мҙқ м „нҷҳл§Өм¶ңм•Ў']),
              purchase_conv: parseNum(row['кө¬л§Өмҷ„лЈҢ м „нҷҳмҲҳ']),
              purchase_rev:  parseNum(row['кө¬л§Өмҷ„лЈҢ м „нҷҳл§Өм¶ңм•Ў(мӣҗ)']||row['кө¬л§Өмҷ„лЈҢ м „нҷҳл§Өм¶ңм•Ў']),
              data_type:     'daily',
            });
          }
          if(!campRows.length){ fileObj.status='м ҖмһҘмӢӨнҢЁ'; renderUploadTab(); toast(`вҡ пёҸ ${fileObj.name} вҖ” мә нҺҳмқё лҚ°мқҙн„° м—ҶмқҢ`); return; }
          fetch(`${SUPABASE_URL}/rest/v1/daily_reports`,{
            method:'POST',
            headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Prefer':'resolution=merge-duplicates'},
            body:JSON.stringify(campRows)
          }).then(res=>{
            if(!res.ok) return res.text().then(t=>{throw new Error(t);});
            fileObj.status='м ҖмһҘмҷ„лЈҢ'; fileObj.savedMonth=month; fileObj.savedCount=campRows.length;
            renderUploadTab();
            toast(`вң… ${fileObj.name} мә нҺҳмқёлі„ вҖ” ${campRows.length}к°ң м ҖмһҘ мҷ„лЈҢ!`);
            saveUploadLog(client, fileObj.name, 'campaign', month, campRows.length);
          }).catch(err=>{ fileObj.status='м ҖмһҘмӢӨнҢЁ'; renderUploadTab(); toast('вқҢ мә нҺҳмқё м ҖмһҘ мӢӨнҢЁ: '+err.message); });
          return;
        }

        // л§ӨмІҙлі„(PC/лӘЁл°”мқј) нҢҢмӢұ
        if(hasDevice){
          const deviceRows = [];
          for(let i = headerIdx+1; i < lines.length; i++){
            const line = lines[i]; if(!line.trim()) continue;
            const vals = csvParseLine(line);
            if(vals.every(v=>!v)) continue;
            const row = {};
            cols.forEach((col,idx)=>{ row[col]=(vals[idx]||'').trim(); });
            deviceRows.push({
              client_key:    client,
              month,
              device:        row['PC/лӘЁл°”мқј л§ӨмІҙ']||'',
              campaign_type: 'нҶөн•©',
              imp:           parseNum(row['л…ём¶ңмҲҳ']),
              click:         parseNum(row['нҒҙлҰӯмҲҳ']),
              ctr:           parseNum(row['нҒҙлҰӯлҘ (%)']),
              cpc:           parseNum(row['нҸүк·  CPC']),
              cost:          parseNum(row['мҙқл№„мҡ©']),
              conv:          parseNum(row['мҙқ м „нҷҳмҲҳ']),

                  date:        dateStr,

                  placement:   'GFA м „мІҙ',
                  imp:         parseNum(r['л…ём¶ңмҲҳ']),
                  click:       parseNum(r['нҒҙлҰӯмҲҳ']),
                  ctr:         parseNum(r['нҒҙлҰӯмңЁ']||r['нҒҙлҰӯлҘ ']||0),
                  cpc:         parseNum(r['нҸүк· CPC']||r['нҸүк·  CPC']||0),
                  cost:        parseNum(r['мҙқкҙ‘кі л№„']||r['мҙқл№„мҡ©']||0),
                  conv:        parseNum(r['мҙқ м „нҷҳмҲҳ']||r['м „нҷҳмҲҳ']||0),
                  rev:         parseNum(r['м „нҷҳл§Өм¶ңм•Ў(мӣҗ)']||r['м „нҷҳл§Өм¶ңм•Ў']||0),
                });
              } else if (isKeyword) {
                const kw = String(r[kwCol]||'').trim();
                  if (!kw) return;
                  if (/^#[A-Z]+[!?]?$/.test(kw) || kw === '#N/A' || kw.startsWith('#')) return;
                allRows.push({
                  data_type: 'keyword', client_key: client, month, keyword: kw,
                  campaign_type: String(r['мә нҺҳмқёмң нҳ•'] || r['мң нҳ•'] || ''),
                  device: String(r['PC/лӘЁл°”мқј л§ӨмІҙ'] || r['PC/лӘЁл°”мқј'] || ''),
                  imp:      parseNum(r['л…ём¶ңмҲҳ']),
                  click:    parseNum(r['нҒҙлҰӯмҲҳ']),
                  cost:     parseNum(r['мҙқл№„мҡ©(VATнҸ¬н•Ё,мӣҗ)'] || r['мҙқл№„мҡ©(VATнҸ¬н•Ё)'] || r['мҙқл№„мҡ©']),
                  avg_rank: parseNum(r['нҸүк· л…ём¶ңмҲңмң„'] || r['нҸүк·  л…ём¶ңмҲңмң„'] || 0),
                  conv:     parseNum(r['мҙқ м „нҷҳмҲҳ'] || r['м „нҷҳмҲҳ']),
                  rev:      parseNum(r['мҙқ м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || r['м „нҷҳл§Өм¶ңм•Ў(мӣҗ)'] || r['м „нҷҳл§Өм¶ңм•Ў'])
                });
              }
            });
          });

          if (!allRows.length) {
            fileObj.status = 'м ҖмһҘмӢӨнҢЁ'; renderUploadTab();
            toast(`вҡ пёҸ ${fileObj.name} вҖ” мқёмӢқлҗң лҚ°мқҙн„° м—ҶмқҢ\nмӢңнҠёлӘ…: ${wb.SheetNames.join(', ')}`);
            return;
          }

          const tableMap = { daily:'daily_reports', keyword:'keyword_reports', hourly:'hourly_reports', gfa_daily:'gfa_reports' };
          const byType = {};
          allRows.forEach(r => {
            if (!byType[r.data_type]) byType[r.data_type] = [];
            byType[r.data_type].push(r);
          });

          let doneCount = 0;
          const typeCount = Object.keys(byType).length;

         const h2 = {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
          };
          // мӣ”лі„лЎң к·ёлЈ№н•‘н•ҙм„ң delete+insert
          const months = [...new Set(allRows.map(r=>r.month))];
          const deletePromises = [];
          Object.keys(byType).forEach(dtype => {
            months.forEach(m => {
              deletePromises.push(
                fetch(`${SUPABASE_URL}/rest/v1/${tableMap[dtype]}?client_key=eq.${client}&month=eq.${m}`, {
                  method: 'DELETE', headers: h2
                })
              );
            });
          });
          Promise.all(deletePromises).then(() => {
            Object.entries(byType).forEach(([dtype, drows]) => {
              fetch(`${SUPABASE_URL}/rest/v1/${tableMap[dtype]}`, {
                method: 'POST',
                headers: { ...h2, 'Prefer': 'return=minimal' },
                body: JSON.stringify(drows)
              }).then(res => {
                if (!res.ok) return res.text().then(t => { throw new Error(t); });
                doneCount++;
                parsedTableData.push(...drows);
                if (doneCount === typeCount) {
                  fileObj.status = 'м ҖмһҘмҷ„лЈҢ';
                  fileObj.savedCount = allRows.length;
                  renderUploadTab();
                  toast(`вң… ${fileObj.name} вҖ” ${allRows.length}к°ң м ҖмһҘ мҷ„лЈҢ!`);
                }
              }).catch(err => {
                fileObj.status = 'м ҖмһҘмӢӨнҢЁ'; renderUploadTab();
                let msg = err.message;
                try { const j = JSON.parse(msg); msg = j.message || j.hint || msg; } catch(e2) {}
                toast(`вқҢ ${fileObj.name} [${dtype}] м ҖмһҘ мӢӨнҢЁ: ${msg}`);
              });
            });
          });

        } catch (err) {
          fileObj.status = 'м ҖмһҘмӢӨнҢЁ'; renderUploadTab();
          console.error('XLSX мІҳлҰ¬ мҳӨлҘҳ:', err);
          toast('вқҢ XLSX мҳӨлҘҳ: ' + err.message);
        }
      };
      reader.readAsBinaryString(fileObj.file);
    });
  }
}

function processFiles(files){

                  conv:parseNum(r['м „нҷҳмҲҳ']),
                  rev:parseNum(r['м „нҷҳл§Өм¶ңм•Ў(мӣҗ)']||r['м „нҷҳл§Өм¶ңм•Ў']||r['м „нҷҳл§Өм¶ң']||0)});
              });

              // нӮӨмӣҢл“ңлҠ” мӣ” м»¬лҹјмқҙ м—ҶмңјлҜҖлЎң нҢҢмқјлӘ…м—җм„ң м¶”м¶ң мӢңлҸ„, м—Ҷмңјл©ҙ мқҙлІҲлӢ¬

              });
              function calcMetrics(imp,click,cost,conv,rev){
                imp=+imp||0;click=+click||0;cost=+cost||0;conv=+conv||0;rev=+rev||0;
                return {imp,click,cost,conv,rev,

              const rawVals = Object.values(wb.Sheets[sheetName])
                .filter(cell=>cell&&cell.v)
                .map(cell=>String(cell.v))
                .slice(0,30); // мғҒлӢЁ 30к°ң м…Җл§Ң нҷ•мқё
              let month = new Date().toISOString().slice(0,7); // кё°ліёк°’: мқҙлІҲлӢ¬
              for(const val of rawVals){
                // '2026л…„ 3мӣ”' лҳҗлҠ” '2026л…„ 03мӣ”' нҳ•нғң
                const m1 = val.match(/(\d{4})л…„\s*(\d{1,2})мӣ”/);
                if(m1){ month=`${m1[1]}-${m1[2].padStart(2,'0')}`; break; }
                // '2026-03', '2026.03' нҳ•нғң

function csvParseLine(line){
  const result=[];
  let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur.trim().replace(/^"|"$/g,''));cur='';}
    else{cur+=ch;}
  }
  result.push(cur.trim().replace(/^"|"$/g,''));
  return result;
}

function parseNum(v){
  if(v===''||v===null||v===undefined)return 0;
  if(typeof v==='number')return v;
  return parseFloat(String(v).replace(/[,мӣҗ\s]/g,''))||0;
}
