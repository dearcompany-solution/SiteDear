let bulkData = [];
function previewBulkExcel(file){
  if(!file) return;
  loadSheetJS(()=>{
    const reader = new FileReader();
    reader.onload = e => {
      try{
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

        // 헤더 행 건너뛰고 데이터만 추출
        const dataRows = rows
  .slice(1) // 헤더 1행 건너뜀
  .filter(r => r[0] && r[1] && r[2]) // 업체명·아이디·비번 필수
  .filter(r => String(r[1]).trim() !== 'example-id'); // 예시 행 자동 제외 // 업체명·아이디·비번 필수
        if(!dataRows.length){
          document.getElementById('bulkPreview').innerHTML =
            `<div style="color:var(--red);font-size:12.5px;padding:10px">⚠️ 유효한 데이터가 없습니다. 업체명·아이디·비밀번호는 필수입니다.</div>`;
          return;
        }

        // 중복 체크 — 아이디 / 업체명 / 검색광고ID / GFA ID (DB + 엑셀 내부)
        const clients = ACCOUNTS.filter(a=>a.role==='client');
        const seenIds      = new Set();
        const seenNames    = new Set();
        const seenSearchIds = new Set();
        const seenGfaIds   = new Set();

        bulkData = dataRows.map(r=>({
          company:   String(r[0]||'').trim(),
          id:        String(r[1]||'').trim(),
          pw:        String(r[2]||'').trim(),
          manager:   String(r[3]||'').trim(),
          url:       String(r[4]||'').trim(),
          memo:      String(r[5]||'').trim(),
          search_id: String(r[6]||'').trim(),
          gfa_id:    String(r[7]||'').trim() || String(r[6]||'').trim(),
          dup:       false,
          dup_reason: ''
        })).filter(r=>r.company&&r.id&&r.pw).map(r=>{
          // DB 중복 체크
          if(clients.find(a=>a.id===r.id)){
            r.dup=true; r.dup_reason='아이디 중복'; return r;
          }
          if(clients.find(a=>a.company===r.company)){
            r.dup=true; r.dup_reason='업체명 중복'; return r;
          }
          if(r.search_id && clients.find(a=>a.naver_search_id===r.search_id)){
            r.dup=true; r.dup_reason='검색광고ID 중복'; return r;
          }
          if(r.gfa_id && clients.find(a=>a.naver_gfa_id===r.gfa_id)){
            r.dup=true; r.dup_reason='GFA ID 중복'; return r;
          }
          // 엑셀 내부 중복 체크
          if(seenIds.has(r.id)){
            r.dup=true; r.dup_reason='엑셀 내 아이디 중복'; return r;
          }
          if(seenNames.has(r.company)){
            r.dup=true; r.dup_reason='엑셀 내 업체명 중복'; return r;
          }
          if(r.search_id && seenSearchIds.has(r.search_id)){
            r.dup=true; r.dup_reason='엑셀 내 검색광고ID 중복'; return r;
          }
          if(r.gfa_id && seenGfaIds.has(r.gfa_id)){
            r.dup=true; r.dup_reason='엑셀 내 GFA ID 중복'; return r;
          }
          // 정상 — Set에 추가
          seenIds.add(r.id);
          seenNames.add(r.company);
          if(r.search_id) seenSearchIds.add(r.search_id);
          if(r.gfa_id) seenGfaIds.add(r.gfa_id);
          return r;
        });

        const newCount  = bulkData.filter(r=>!r.dup).length;
        const dupCount  = bulkData.filter(r=>r.dup).length;

        const previewHtml = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="font-size:13px;font-weight:600;color:var(--text)">
              미리보기 — 총 ${bulkData.length}개
              <span style="color:var(--naver);font-size:12px;margin-left:8px">✅ 신규 ${newCount}개</span>
              ${dupCount>0?`<span style="color:var(--text3);font-size:12px;margin-left:6px">⏭ 중복 ${dupCount}개 건너뜀</span>`:''}
            </div>
          </div>
          <div style="overflow-x:auto;max-height:280px;overflow-y:auto;border:1.5px solid var(--border);border-radius:var(--radius)">
            <table class="cl-table">
             <thead><tr>
                <th style="width:40px">No</th>
                <th>업체명</th>
                <th>아이디</th>
                <th>담당 매니저</th>
                <th>검색광고 ID</th>
                <th>GFA ID</th>
                <th style="width:100px">상태</th>
              </tr></thead>
              <tbody>
                ${bulkData.map((r,idx)=>`<tr>
                  <td style="color:var(--text3);font-size:11px">${idx+1}</td>
                  <td><b>${r.company}</b></td>
                  <td style="font-size:11.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${r.id}</td>
                  <td style="font-size:12px">${r.manager||'미지정'}</td>
                  <td style="font-size:11.5px;font-family:'IBM Plex Mono',monospace;color:var(--naver)">${r.search_id||'—'}</td>
                  <td style="font-size:11.5px;font-family:'IBM Plex Mono',monospace;color:var(--blue)">${r.gfa_id&&r.gfa_id!==r.search_id?r.gfa_id:(r.gfa_id?'동일':'—')}</td>
                  <td>${r.dup
                    ? `<span style="font-size:11px;color:var(--red);background:var(--red-l);padding:2px 8px;border-radius:20px;border:1px solid rgba(239,68,68,.2)" title="${r.dup_reason}">🚫 ${r.dup_reason||'중복'}</span>`
                    : `<div style="display:flex;align-items:center;gap:4px"><div class="sdot"></div><span style="font-size:11px">신규 등록</span></div>`
                  }</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>`;

        document.getElementById('bulkPreview').innerHTML = previewHtml;
        const btn = document.getElementById('bulkRegisterBtn');
        if(btn) btn.style.display = newCount>0 ? 'inline-flex' : 'none';

      }catch(err){
        document.getElementById('bulkPreview').innerHTML =
          `<div style="color:var(--red);font-size:12.5px;padding:10px">❌ 파일 읽기 실패: ${err.message}</div>`;
      }
    };
    reader.readAsBinaryString(file);
  });
}

async function executeBulkRegister(){
  const toRegister = bulkData.filter(r=>!r.dup);
  if(!toRegister.length){ toast('⚠️ 등록할 신규 업체가 없습니다'); return; }

  const btn = document.getElementById('bulkRegisterBtn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ 등록 중...'; }

  let successCount = 0, failCount = 0;

  for(const c of toRegister){
    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/clients`,{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SUPABASE_ANON_KEY,
          'Authorization':'Bearer '+SUPABASE_ANON_KEY,
          'Prefer':'return=representation'
        },
        body:JSON.stringify({
          client_key:      c.id,
          password:        c.pw,
          company_name:    c.company,
          manager:         c.manager,
          store_url:       c.url,
          memo:            c.memo||'',
          naver_search_id: c.search_id||null,
          naver_gfa_id:    c.gfa_id||null,
          is_active:       true
        })
      });
      if(!res.ok) throw new Error(await res.text());
      ACCOUNTS.push({id:c.id, pw:c.pw, role:'client', name:c.company, company:c.company, manager:c.manager, url:c.url, memo:c.memo||'', naver_search_id:c.search_id||'', naver_gfa_id:c.gfa_id||''});
      successCount++;
    }catch(err){
      console.error(`${c.company} 등록 실패:`, err);
      failCount++;
    }
  }

  closeModal();
  bulkData = [];

  if(failCount===0){
    toast(`✅ ${successCount}개 업체 일괄 등록 완료!`);
  } else {
    toast(`✅ ${successCount}개 등록 완료 / ❌ ${failCount}개 실패`);
  }
  renderContent('admin');
}

  const s=document.getElementById('rg-mgr');if(s)s.value='';

}

          {label:'노출수', data:wImp,   backgroundColor:'rgba(3,199,90,.5)',  borderRadius:6, yAxisID:'y'},
          {label:'클릭수', data:wClick, type:'line', borderColor:'#F59E0B', backgroundColor:'rgba(245,158,11,.1)', borderWidth:2, tension:.4, fill:true, pointRadius:4, yAxisID:'y1'},
        ]
      },options:{responsive:true,
        scales:{
          x:ax,
          y:{...ax,position:'left',ticks:{...ax.ticks,color:'#03C75A',callback:v=>v.toLocaleString()}},
          y1:{grid:{display:false},ticks:{color:'#F59E0B',font:{size:10,family:'IBM Plex Mono'},callback:v=>v.toLocaleString()},position:'right'}
        },
        plugins:{legend:{labels:{color:'#4a5670',font:{size:11,family:'Noto Sans KR'},padding:12}}}
      }});

      // ② 주차별 광고비·ROAS
      mk('gfaWeekRoas',{type:'bar',data:{
        labels: wLabels,
        datasets:[
          {label:'광고비', data:wCost, backgroundColor:'rgba(79,70,229,.5)', borderRadius:6, yAxisID:'y'},
          {label:'ROAS(%)', data:wRoas, type:'line', borderColor:'#EF4444', backgroundColor:'rgba(239,68,68,.08)', borderWidth:2, tension:.4, fill:true, pointRadius:4, yAxisID:'y1'},
        ]
      },options:{responsive:true,
        scales:{
          x:ax,
          y:{...ax,position:'left',ticks:{...ax.ticks,color:'#4F46E5',callback:v=>'₩'+Math.round(v).toLocaleString()}},
          y1:{grid:{display:false},ticks:{color:'#EF4444',font:{size:10,family:'IBM Plex Mono'},callback:v=>v.toFixed(0)+'%'},position:'right'}
        },
        plugins:{legend:{labels:{color:'#4a5670',font:{size:11,family:'Noto Sans KR'},padding:12}}}
      }});

      // ③ 일별 노출수·클릭수
      mk('gfaDailyBar',{type:'bar',data:{
        labels: dLabels,
        datasets:[
          {label:'노출수', data:dImp,   backgroundColor:'rgba(3,199,90,.4)',  borderRadius:4, yAxisID:'y'},
          {label:'클릭수', data:dClick, type:'line', borderColor:'#F59E0B', backgroundColor:'rgba(245,158,11,.08)', borderWidth:2, tension:.4, fill:true, pointRadius:2, yAxisID:'y1'},
        ]
      },options:{responsive:true,
        scales:{
          x:{...ax,ticks:{...ax.ticks,maxTicksLimit:15}},
          y:{...ax,position:'left',ticks:{...ax.ticks,color:'#03C75A',callback:v=>v.toLocaleString()}},
          y1:{grid:{display:false},ticks:{color:'#F59E0B',font:{size:10,family:'IBM Plex Mono'},callback:v=>v.toLocaleString()},position:'right'}
        },
        plugins:{legend:{labels:{color:'#4a5670',font:{size:11,family:'Noto Sans KR'},padding:12}}}
      }});

      // ④ 일별 광고비·평균CPC
      mk('gfaDailyCost',{type:'bar',data:{
        labels: dLabels,
        datasets:[
          {label:'광고비',   data:dCost, backgroundColor:'rgba(79,70,229,.4)', borderRadius:4, yAxisID:'y'},
          {label:'평균CPC', data:dCpc,  type:'line', borderColor:'#FF6B35', backgroundColor:'rgba(255,107,53,.08)', borderWidth:2, tension:.4, fill:true, pointRadius:2, yAxisID:'y1'},
        ]
      },options:{responsive:true,
        scales:{
          x:{...ax,ticks:{...ax.ticks,maxTicksLimit:15}},
          y:{...ax,position:'left',ticks:{...ax.ticks,color:'#4F46E5',callback:v=>'₩'+Math.round(v).toLocaleString()}},
          y1:{grid:{display:false},ticks:{color:'#FF6B35',font:{size:10,family:'IBM Plex Mono'},callback:v=>'₩'+v.toLocaleString()},position:'right'}
        },
        plugins:{legend:{labels:{color:'#4a5670',font:{size:11,family:'Noto Sans KR'},padding:12}}}
      }});

    }, 100);

  }catch(e){
    el.innerHTML=`<div class="empty"><div class="ei">❌</div><p>데이터 로드 실패: ${e.message}</p></div>`;
  }
}

function toast(msg,dur=2800){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}
function openDownload(){
  document.getElementById('modalTitle').textContent='리포트 다운로드';
  document.getElementById('modalBody').innerHTML=`<p style="font-size:13px;color:var(--text2);margin-bottom:12px">보고서확인 메뉴에서 월별 PDF를 다운로드하거나 아래 파일을 선택하세요.</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="radio" name="dl" checked> 2026년 2월 통합 성과 리포트</label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="radio" name="dl"> 2025년 12월 통합 성과 리포트</label>
    </div>`;
  document.getElementById('modalFooter').innerHTML=`<button class="btn btn-ol" onclick="closeModal()">취소</button><button class="btn btn-bl" onclick="go('report',null);setActive('report');openPdfPreview();closeModal()">📄 PDF 열기</button>`;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('click',e=>{
  const overlay=document.getElementById('pdfOverlay');
  if(overlay&&e.target===overlay)closePdfOverlay();
});

(function(){
  const saved         = sessionStorage.getItem('currentUser');
  const savedPage     = sessionStorage.getItem('currentPage') || 'combined';
  const savedClientId = sessionStorage.getItem('activeClientId');
  if(saved){
    currentUser = JSON.parse(saved);
    if(savedClientId) activeClientId = savedClientId;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('appShell').style.display='block';
    const page = savedPage === 'combined' && currentUser.role === 'admin' && !savedClientId ? 'admin' : savedPage;
    initApp(page);
  }
})();
