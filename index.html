<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디어컴퍼니 솔루션</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/dearcompany-solution/SiteDear/main/logo.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/dearcompany-solution/SiteDear/main/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ════ 기본 변수 ════ */
:root {
  --bg:#e8eef6; --bg2:#dde5f0; --white:#fff; --surface:#f3f6fb;
  --border:#cfd8e8; --border2:#b8c5d9;
  --text:#1a2235; --text2:#4a5670; --text3:#8a96ae;
  --naver:#03C75A; --naver-l:#e6f9ef; --naver-m:rgba(3,199,90,.13);
  --store:#FF6B35; --store-l:#fff2ec; --store-m:rgba(255,107,53,.13);
  --blue:#3B82F6; --blue-l:#eff6ff; --blue-m:rgba(59,130,246,.13);
  --gold:#F59E0B; --gold-l:#fffbeb;
  --red:#EF4444; --red-l:#fef2f2;
  --indigo:#4F46E5; --indigo-l:#eef2ff;
  --navy:#1c2535; --navy2:#253047;
  --radius:14px; --rsm:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.07);
  --shm:0 4px 20px rgba(0,0,0,.11);
  --sw:236px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ════ LOGIN ════ */
#loginPage{display:flex;min-height:100vh;background:linear-gradient(135deg,#d4e3f5 0%,#e8eef6 50%,#dde8f4 100%);align-items:center;justify-content:center;position:relative;overflow:hidden}
#loginPage::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 15% 25%,rgba(59,130,246,.1) 0%,transparent 70%),radial-gradient(ellipse 500px 400px at 85% 75%,rgba(3,199,90,.07) 0%,transparent 70%)}
.lcrd{background:var(--white);border-radius:20px;padding:44px 44px 40px;width:420px;box-shadow:0 8px 40px rgba(0,0,0,.13);position:relative;z-index:1;animation:slideUp .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.l-brand{text-align:center;margin-bottom:28px}
.l-co{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.l-prod{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.l-prod em{color:var(--blue);font-style:normal}
.l-sub{font-size:12px;color:var(--text3);margin-top:3px}
.lhr{height:1px;background:var(--border);margin:20px 0}
.lg{margin-bottom:14px}
.lg label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px}
.lg input{width:100%;border:1.5px solid var(--border);border-radius:var(--rsm);padding:10px 13px;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:all .15s}
.lg input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-m);background:var(--white)}
.lbtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--rsm);padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;margin-top:4px}
.lbtn:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 4px 14px rgba(59,130,246,.35)}
.lerr{color:var(--red);font-size:12.5px;text-align:center;margin-top:9px;display:none}
.lhint{margin-top:18px;padding:13px;background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);font-size:11.5px;color:var(--text3);line-height:1.9}
.lhint b{color:var(--text2)}

/* ════ APP ════ */
#appShell{display:none}

/* ════ SIDEBAR ════ */
.sb{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;box-shadow:2px 0 12px rgba(0,0,0,.05)}
.sb-top{padding:17px 18px 14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%)}
.sb-co{font-size:9.5px;letter-spacing:2.5px;color:rgba(255,255,255,.4);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-bottom:3px}
.sb-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.2}
.sb-name em{color:#60a5fa;font-style:normal}
.sb-tag{font-size:9.5px;color:rgba(255,255,255,.3);margin-top:2px;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px}
.nav{padding:10px 10px;flex:1;overflow-y:auto}
.nsec{font-size:9.5px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;padding:10px 10px 4px;font-family:'IBM Plex Mono',monospace}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--rsm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--bg);color:var(--text)}
.ni.active{background:var(--blue-l);color:var(--blue);font-weight:600}
.ni.adm{background:linear-gradient(90deg,rgba(79,70,229,.07),transparent)}
.ni.adm.active{background:var(--indigo-l);color:var(--indigo)}
.ni.rpt{background:linear-gradient(90deg,rgba(3,199,90,.07),transparent)}
.ni.rpt.active{background:var(--naver-l);color:var(--naver);font-weight:600}
.ni .ic{font-size:15px;width:18px;text-align:center}
.nbadge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
.nb-g{background:var(--naver-m);color:var(--naver)}.nb-r{background:rgba(239,68,68,.13);color:var(--red)}.nb-b{background:var(--blue-m);color:var(--blue)}
.sb-bottom{border-top:1px solid var(--border)}
.sb-client{padding:11px 14px;background:var(--surface)}
.sb-cl-lbl{font-size:9.5px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;font-family:'IBM Plex Mono',monospace}
.sb-cl-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rsm);padding:9px 12px}
.sb-cl-name{font-size:13px;font-weight:700}
.sb-cl-id{font-size:10.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.sb-st{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--naver);margin-top:5px;font-weight:500}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--naver);box-shadow:0 0 0 2px var(--naver-m)}
.sb-logout{margin:0 10px 12px;display:flex}
.btn-lo{width:100%;background:var(--red-l);border:1.5px solid rgba(239,68,68,.2);color:var(--red);border-radius:var(--rsm);padding:8px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;text-align:center}
.btn-lo:hover{background:var(--red);color:#fff}

/* ════ TOPBAR ════ */
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);padding:12px 26px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tb-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tb-title{font-size:15.5px;font-weight:700;letter-spacing:-.3px}
.tb-sub{font-size:11.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.tb-actions{display:flex;gap:8px;align-items:center}
.date-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dq-btn{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);background:var(--white);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap}
.dq-btn:hover{border-color:var(--blue);color:var(--blue)}
.dq-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.date-sep{width:1px;height:16px;background:var(--border);margin:0 2px}
.date-custom{display:flex;align-items:center;gap:6px}
.date-custom input{border:1.5px solid var(--border2);border-radius:var(--rsm);padding:5px 10px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--text);background:var(--white);outline:none;transition:border-color .15s;cursor:pointer}
.date-custom input:focus{border-color:var(--blue)}
.date-custom span{font-size:12px;color:var(--text3)}
.drange-label{font-size:12px;font-weight:600;color:var(--text2);padding:5px 12px;background:var(--surface);border-radius:20px;border:1.5px solid var(--border);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.nav-tab{padding:9px 16px;font-size:12.5px;font-weight:500;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.nav-tab:hover{color:var(--blue)}
.nav-tab.active{color:var(--blue);font-weight:700;border-bottom-color:var(--blue)}

/* ════ MAIN ════ */
.main{margin-left:var(--sw);min-height:100vh}
.content{padding:22px 26px}
.panel{display:none}
.panel.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ════ BUTTONS ════ */
.btn{border:none;border-radius:var(--rsm);font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-size:12.5px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px;line-height:1}
.btn-ol{background:var(--white);border:1.5px solid var(--border2);color:var(--text2);padding:7px 13px}
.btn-ol:hover{border-color:var(--blue);color:var(--blue)}
.btn-bl{background:var(--blue);color:#fff;padding:8px 15px}
.btn-bl:hover{background:#2563eb}
.btn-gn{background:var(--naver);color:#fff;padding:8px 15px}
.btn-or{background:var(--store);color:#fff;padding:8px 15px}
.btn-in{background:var(--indigo);color:#fff;padding:8px 15px}
.btn-rd{background:var(--red);color:#fff;padding:7px 13px}
.btn-sm{padding:5px 10px;font-size:11.5px}

/* ════ KPI ════ */
.kpi6{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:18px}
.kpi{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:box-shadow .2s}
.kpi:hover{box-shadow:var(--shm)}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.kpi.kn::after{background:var(--naver)}.kpi.kb::after{background:var(--blue)}.kpi.kg::after{background:var(--gold)}.kpi.ks::after{background:var(--store)}.kpi.kr::after{background:var(--red)}.kpi.ki::after{background:var(--indigo)}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kpi-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.kic-n{background:var(--naver-l)}.kic-b{background:var(--blue-l)}.kic-g{background:var(--gold-l)}.kic-s{background:var(--store-l)}.kic-r{background:var(--red-l)}.kic-i{background:var(--indigo-l)}
.kpi-chip{font-size:9.5px;padding:2px 8px;border-radius:20px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.kc-n{background:var(--naver-m);color:var(--naver)}.kc-s{background:var(--store-m);color:var(--store)}
.kpi-lbl{font-size:11.5px;color:var(--text2);margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:700;letter-spacing:-.7px;font-family:'IBM Plex Mono',monospace;line-height:1;margin-bottom:7px}
.kpi-ch{font-size:11.5px;display:flex;align-items:center;gap:3px}
.up{color:var(--naver)}.dn{color:var(--red)}.vs{color:var(--text3);margin-left:3px}

/* ════ CARDS ════ */
.row2{display:grid;grid-template-columns:2fr 1fr;gap:13px;margin-bottom:18px}
.row2b{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--sh)}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:15px}
.card-title{font-size:14px;font-weight:600;letter-spacing:-.2px}
.card-sub{font-size:11.5px;color:var(--text3);margin-top:2px}
.sec-lbl{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-lbl span{font-size:10.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.sum-bar{display:flex;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sh);margin-bottom:18px}
.sum-item{flex:1;padding:14px 16px;border-right:1px solid var(--border)}
.sum-item:last-child{border-right:none}
.sum-lbl{font-size:11px;color:var(--text3);margin-bottom:4px}
.sum-val{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:-.5px}
.sum-ch{font-size:11px;margin-top:3px}

/* ════ TABLE ════ */
.tbl{width:100%;border-collapse:collapse}
th{font-size:10.5px;color:var(--text3);text-align:left;padding:8px 12px;border-bottom:1.5px solid var(--border);font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
td{font-size:13px;padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface)}
.rank{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.r1{background:rgba(245,158,11,.15);color:var(--gold)}.r2{background:rgba(148,163,184,.12);color:#888}.r3{background:rgba(180,100,60,.1);color:#b46038}.rn{background:var(--surface);color:var(--text3)}
.bar-w{display:flex;align-items:center;gap:7px}
.bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;min-width:50px}
.bar-fg{height:100%;border-radius:3px}.bar-nv{background:var(--naver)}.bar-st{background:var(--store)}
.pct{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;min-width:30px;text-align:right}

/* ════ DATA INPUT ════ */
.itabs{display:flex;gap:8px;margin-bottom:16px}
.itab{padding:8px 18px;border-radius:var(--rsm);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.itab.a-nv{background:var(--naver-l);border-color:var(--naver);color:var(--naver);font-weight:600}
.itab.a-st{background:var(--store-l);border-color:var(--store);color:var(--store);font-weight:600}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.fg .full{grid-column:1/-1}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:11.5px;font-weight:600;color:var(--text2)}
.fl .req{color:var(--naver)}
.fi{border:1.5px solid var(--border2);border-radius:var(--rsm);padding:9px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--white);outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-m)}
.saved-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);margin-bottom:7px}
.saved-meta{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px}

/* ════ MESSAGING ════ */
.msg-layout{display:grid;grid-template-columns:280px 1fr;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sh);min-height:480px}
.msg-sb{border-right:1px solid var(--border);display:flex;flex-direction:column}
.msg-sb-hd{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.msg-thread{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;position:relative}
.msg-thread:hover{background:var(--surface)}
.msg-thread.active{background:var(--blue-l)}
.msg-thread.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue)}
.mt-name{font-size:13px;font-weight:600}
.mt-time{font-size:10.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.mt-prev{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.ubadge{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--blue);margin-left:5px;vertical-align:middle}
.msg-main{display:flex;flex-direction:column}
.msg-main-hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat{flex:1;padding:14px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
.brow{display:flex;gap:9px}
.brow.mine{flex-direction:row-reverse}
.bav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.bav-m{background:var(--naver-l);color:var(--naver)}.bav-c{background:var(--blue-l);color:var(--blue)}
.bubble{max-width:72%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.6}
.bubble.mgr{background:var(--white);border:1px solid var(--border)}.bubble.cli{background:var(--blue);color:#fff}
.bmeta{font-size:10.5px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.brow.mine .bmeta{text-align:right}
.msg-inp{padding:11px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.msg-inp textarea{flex:1;border:1.5px solid var(--border2);border-radius:var(--rsm);padding:8px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;height:40px;transition:border-color .15s;background:var(--surface)}
.msg-inp textarea:focus{border-color:var(--blue);background:var(--white)}

/* ════ CALENDAR ════ */
.notice-pinned{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--rsm);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:opacity .15s}
.notice-pinned:hover{opacity:.9}
.np-icon{font-size:16px;flex-shrink:0}
.np-content{flex:1;min-width:0}
.np-title{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-meta{font-size:10.5px;color:rgba(255,255,255,.45);margin-top:1px;font-family:'IBM Plex Mono',monospace}
.np-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;background:var(--blue);color:#fff;white-space:nowrap;flex-shrink:0}
.cal-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cal-wrap{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--sh)}
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-month{font-size:15px;font-weight:700;min-width:120px;text-align:center}
.cal-nav-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--blue);color:var(--blue)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;font-family:'IBM Plex Mono',monospace}
.cal-day{position:relative;text-align:center;padding:6px 2px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s;min-height:34px;display:flex;flex-direction:column;align-items:center;gap:2px}
.cal-day:hover{background:var(--blue-l)}

════════════════════════════════════════ */
async function doLogin(){
  const id = document.getElementById('lid').value.trim();
  const pw = document.getElementById('lpw').value.trim();
  const errEl = document.getElementById('lerr');
  
  if(!id || !pw){
    errEl.textContent = "아이디와 비밀번호를 모두 입력해주세요.";
    errEl.style.display = 'block';
    return;
  }

  // 1. 로컬 계정 먼저 확인 (관리자 포함)
  let acc = ACCOUNTS.find(a => a.id === id && a.pw === pw);

  // 2. 로컬에 없을 경우에만 Supabase DB에서 확인 (클라이언트 계정)
  if(!acc){
    try {
      const response = await fetch(
        `${SUPABASE_URL}/rest/v1/clients?client_key=eq.${encodeURIComponent(id)}&select=*`,
        {
          method: 'GET',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json'
          }
        }
      );

      if(response.ok){
        const rows = await response.json();
        if(rows && rows.length > 0){
          const row = rows[0];
          if(row.password === pw){
            acc = {
              id: row.client_key,
              pw: row.password,
              role: 'client',
              name: row.company_name,
              company: row.company_name,
              manager: row.manager || '',
              url: row.store_url || '',
            };
            if(!ACCOUNTS.find(a => a.id === acc.id)) ACCOUNTS.push(acc);
          }
        }
      } else {
        // Supabase 응답 오류 — 클라이언트 로그인만 실패, 관리자는 이미 위에서 처리됨
        console.warn('Supabase 응답 오류:', response.status);
        errEl.textContent = "서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.";
        errEl.style.display = 'block';
        return;
      }
    } catch(e) {
      console.error('로그인 중 에러 발생:', e);
      errEl.textContent = "서버 연결에 실패했습니다.";
      errEl.style.display = 'block';
      return;
    }
  }

  // 3. 최종 로그인 성공 처리
  if(acc){
    currentUser = acc;
    sessionStorage.setItem('currentUser', JSON.stringify(acc));
    sessionStorage.setItem('currentPage', acc.role==='admin' ? 'admin' : 'combined');
    errEl.style.display = 'none';
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    initApp();
  } else {
    errEl.textContent = "아이디 또는 비밀번호가 올바르지 않습니다.";
    errEl.style.display = 'block';
  }
}

/* ── Supabase 계정 목록 로드 ── */
async function loadClientsFromSupabase(){
  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/clients?select=*&is_active=eq.true&order=created_at.desc`,
      {headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}}
    );
    const rows = await res.json();
    if(!Array.isArray(rows)||!rows.length) return;

    // ACCOUNTS를 Supabase 데이터 기준으로 완전히 재구성 (관리자 계정만 유지)
    const adminAcc = ACCOUNTS.find(a=>a.role==='admin');
    ACCOUNTS.length = 0;
    if(adminAcc) ACCOUNTS.push(adminAcc);

    rows.forEach(row=>{
      if(row.client_key==='dearcompany') return;
      ACCOUNTS.push({
        id:      row.client_key,
        pw:      row.password,
        role:    'client',
        name:    row.company_name,
        company: row.company_name,
        manager: row.manager   || '',
        url:     row.store_url || '',
      });
    });

    // 관리자 화면이면 테이블만 갱신
    if(typeof renderAdminTable === 'function'){
      renderAdminTable();
    }
    console.log(`✅ 계정 ${rows.length}개 로드됨`);
  }catch(e){
    console.warn('계정 목록 로드 실패:', e);
  }
}

/* ════════════════════════════════════════
   DATE PICKER
════════════════════════════════════════ */
function setQuick(type,btn){
  document.querySelectorAll('.dq-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('dtFrom').value='';
  document.getElementById('dtTo').value='';
  const today=new Date();
  let from,to;
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const disp=d=>`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  if(type==='today'){from=to=new Date();}
  else if(type==='yesterday'){const y=new Date(today);y.setDate(y.getDate()-1);from=to=y;}
  else if(type==='thisweek'){const d=new Date(today);d.setDate(d.getDate()-d.getDay()+1);from=d;to=new Date();}
  else if(type==='lastweek'){const e=new Date(today);e.setDate(e.getDate()-e.getDay());const s=new Date(e);s.setDate(e.getDate()-6);from=s;to=e;}
  else if(type==='thismonth'){from=new Date(today.getFullYear(),today.getMonth(),1);to=new Date();}
  else if(type==='lastmonth'){from=new Date(today.getFullYear(),today.getMonth()-1,1);to=new Date(today.getFullYear(),today.getMonth(),0);}
  currentDateRange={from:fmt(from),to:fmt(to)};
  document.getElementById('drangeLabel').textContent=`${disp(from)} ~ ${disp(to)}`;
  toast('📅 기간이 변경되었습니다');
}
function onCustomDate(){
  const f=document.getElementById('dtFrom').value;
  const t=document.getElementById('dtTo').value;
  if(!f||!t)return;
  document.querySelectorAll('.dq-btn').forEach(b=>b.classList.remove('active'));
  currentDateRange={from:f,to:t};
  const disp=s=>{const[y,m,d]=s.split('-');return`${y}.${m}.${d}`};
  document.getElementById('drangeLabel').textContent=`${disp(f)} ~ ${disp(t)}`;
}

/* ════════════════════════════════════════
   보고서 데이터 로드 & 렌더
════════════════════════════════════════ */
async function fetchReportData(month){
  try{
    const isAdmin      = currentUser?.role==='admin';
    const targetClient = isAdmin ? (activeClientId||'') : (currentUser?.id||'');
    if(!targetClient) return null;

    const h={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY};
    const [dailyRes,kwRes,hourlyRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/daily_reports?client_key=eq.${targetClient}&month=eq.${month}&select=*&limit=2000`,{headers:h}),
      fetch(`${SUPABASE_URL}/rest/v1/keyword_reports?client_key=eq.${targetClient}&month=eq.${month}&select=*&limit=5000`,{headers:h}),
      fetch(`${SUPABASE_URL}/rest/v1/hourly_reports?client_key=eq.${targetClient}&month=eq.${month}&select=*&limit=500`,{headers:h}),
    ]);
    const dailyArr  = await dailyRes.json().then(r=>Array.isArray(r)?r:[]);
    const kwArr     = await kwRes.json().then(r=>Array.isArray(r)?r:[]);
    const hourlyArr = await hourlyRes.json().then(r=>Array.isArray(r)?r:[]);

    if(!dailyArr.length&&!kwArr.length&&!hourlyArr.length) return null;

    const sum=(arr,key)=>arr.reduce((s,r)=>s+(+r[key]||0),0);
    const totalImp=sum(dailyArr,'imp'), totalClick=sum(dailyArr,'click');
    const totalCost=sum(dailyArr,'cost'), totalConv=sum(dailyArr,'conv'), totalRev=sum(dailyArr,'rev');
    const roas=totalCost>0?totalRev/totalCost:0;
    const ctr=totalImp>0?(totalClick/totalImp)*100:0;
    const cpc=totalClick>0?totalCost/totalClick:0;

    // 채널별 집계
    const chMap={};
    dailyArr.forEach(r=>{
      const key=`${r.campaign_type||''} (${r.device||''})`;
      if(!chMap[key]) chMap[key]={name:key,imp:0,click:0,cost:0,conv:0,rev:0};
      chMap[key].imp+=+r.imp||0; chMap[key].click+=+r.click||0;
      chMap[key].cost+=+r.cost||0; chMap[key].conv+=+r.conv||0; chMap[key].rev+=+r.rev||0;
    });
    const channels=Object.values(chMap).map(c=>({...c,roas:c.cost>0?c.rev/c.cost:0})).sort((a,b)=>b.cost-a.cost);

    // 주별 집계
    const weekMap={};
    dailyArr.forEach(r=>{
      const day=new Date(r.date).getDate();
      const wk=day<=7?'1주':day<=14?'2주':day<=21?'3주':'4주';
      if(!weekMap[wk]) weekMap[wk]={week:wk,imp:0,click:0,cost:0,conv:0,rev:0};
      weekMap[wk].imp+=+r.imp||0; weekMap[wk].click+=+r.click||0;
      weekMap[wk].cost+=+r.cost||0; weekMap[wk].conv+=+r.conv||0; weekMap[wk].rev+=+r.rev||0;
    });
    const weekly=['1주','2주','3주','4주'].map(w=>weekMap[w]||{week:w,imp:0,click:0,cost:0,conv:0,rev:0});

    // 시간대별 집계
    const hourMap={};
    hourlyArr.forEach(r=>{
      const t=r.time_slot||'';
      if(!hourMap[t]) hourMap[t]={time:t,click:0,cost:0,conv:0,rev:0};
      hourMap[t].click+=+r.click||0; hourMap[t].cost+=+r.cost||0;
      hourMap[t].conv+=+r.conv||0; hourMap[t].rev+=+r.rev||0;
    });
    const hourly=Object.values(hourMap).map(h=>({...h,pct:totalClick>0?h.click/totalClick:0}));

    // 상위 키워드 TOP20
    const kwMap={};
    kwArr.forEach(r=>{
      const key=`${r.keyword}__${r.campaign_type}__${r.device}`;
      if(!kwMap[key]) kwMap[key]={keyword:r.keyword,type:r.campaign_type,device:r.device,cost:0,click:0,conv:0,rev:0};
      kwMap[key].cost+=+r.cost||0; kwMap[key].click+=+r.click||0;
      kwMap[key].conv+=+r.conv||0; kwMap[key].rev+=+r.rev||0;
    });
    const topKeywords=Object.values(kwMap).sort((a,b)=>b.rev-a.rev||b.cost-a.cost).slice(0,20);

    const acc=ACCOUNTS.find(a=>a.id===targetClient);
    const [y,m]=month.split('-');
    return {
      client:targetClient, period:`${y}년 ${parseInt(m)}월`, manager:acc?.manager||'—',
      kpi:{totalImp,totalClick,totalCost,totalConv,totalRev,roas,ctr,cpc},
      mom:{click:0,cost:0,rev:0,roas:0},
      channels, weekly, hourly, topKeywords, insights:[],
    };
  }catch(e){
    console.warn('데이터 집계 실패:',e);
    return null;
  }
}

async function loadReportData(month){
  currentReportMonth=month;
  let data=await fetchReportData(month);

  // 데이터 없으면 화면 전체 초기화 후 0 표시
  if(!data){
    data={
      client:currentUser?.company||'—',
      period:month.replace('-','년 ')+'월',
      manager:'—',
      kpi:{totalImp:0,totalClick:0,totalCost:0,totalConv:0,totalRev:0,roas:0,ctr:0,cpc:0},
      mom:{click:0,cost:0,rev:0,roas:0},
      channels:[],weekly:[],hourly:[],topKeywords:[],insights:[],
      _empty:true
    };
  }

  // ── 차트 초기화 (이전 달 데이터 제거) ──
  if(reportCharts.weekly){try{reportCharts.weekly.destroy();}catch(e){} reportCharts.weekly=null;}

  // ── 테이블/인사이트 전체 초기화 ──
  const clearEls=['rptChannelTable','rptKwTable','rptHourly','rptInsights'];
  clearEls.forEach(id=>{

    if(!el)return;
    if(id==='rptChannelTable'){
      const tb=el.querySelector('tbody');
      if(tb)tb.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">📭 데이터 없음</td></tr>`;

      el.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">📭 데이터 없음</div>`;

      ]},
      options:{responsive:true,maintainAspectRatio:false,
        scales:{x:ax,y:{...ax,position:'left'},y1:{grid:{display:false},position:'right'}},
        plugins:{legend:{labels:{color:'#4a5670',font:{size:11},padding:12}}}}
    });
  }

  const fmt =n=>n>=1000000?'₩'+(n/1000000).toFixed(1)+'M':n>=1000?'₩'+(n/1000).toFixed(0)+'K':'₩'+n.toLocaleString();
  const fmtN=n=>n.toLocaleString();
  const momStr=v=>v>0?`<span class="up">▲ ${fmtN(Math.abs(v))}</span>`:v<0?`<span class="dn">▼ ${fmtN(Math.abs(v))}</span>`:'<span style="color:var(--text3)">—</span>';
  const $s=(id,v)=>{const el=document.getElementById(id);if(el)el.innerHTML=v;};

// 데이터 없는 달은 0 표시 + 안내 문구
  if(data._empty){
    $s('rk-imp',   '0');
    $s('rk-click', '0');
    $s('rk-cost',  '₩0');
    $s('rk-rev',   '₩0');
    $s('rk-roas',  '0%');
    $s('rk-imp-sub',   '<span style="color:var(--text3);font-size:10px">데이터 없음</span>');
    $s('rk-click-sub', '<span style="color:var(--text3);font-size:10px">데이터 없음</span>');
    $s('rk-cost-sub',  '<span style="color:var(--text3);font-size:10px">데이터 없음</span>');
    $s('rk-rev-sub',   '<span style="color:var(--text3);font-size:10px">데이터 없음</span>');

  } else {
    $s('rk-imp',   fmtN(data.kpi.totalImp));
    $s('rk-click', fmtN(data.kpi.totalClick));
    $s('rk-cost',  fmt(data.kpi.totalCost));
    $s('rk-rev',   fmt(data.kpi.totalRev));
    $s('rk-roas',  (data.kpi.roas*100).toFixed(0)+'%');
    $s('rk-click-sub', momStr(data.mom.click)+' <span style="color:var(--text3);font-size:10px">전월비</span>');

async function loadMonthlyTrend(){
  try{
    const clientKey = currentUser?.role==='admin' ? (activeClientId||'') : (currentUser?.id||'');
    let url = `${SUPABASE_URL}/rest/v1/ad_reports?select=month,period_label,total_rev,total_cost,roas&order=month.desc&limit=12`;
    if(clientKey) url += `&client_key=eq.${clientKey}`;

    const res = await fetch(url,{
      headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}
    });
    const rows = await res.json();
    if(!Array.isArray(rows)||!rows.length) return;

    // MONTHLY_TREND 업데이트
    rows.forEach(r=>{
      const exists = MONTHLY_TREND.find(t=>t.month===r.month);
      const label = r.period_label ? r.period_label.replace('년 ','년').replace('월','월') : r.month;
      if(!exists){
        MONTHLY_TREND.push({month:r.month, label:label.slice(-3), roas:+(r.roas||0), cost:r.total_cost||0, rev:r.total_rev||0});
      } else {
        exists.roas = +(r.roas||0);
        exists.cost = r.total_cost||0;
        exists.rev  = r.total_rev||0;
      }
    });
    MONTHLY_TREND.sort((a,b)=>a.month.localeCompare(b.month));

    // 월 선택 드롭다운 업데이트
    const sel = document.getElementById('reportMonthSel');
    if(sel){
      const allMonths = [...new Set([...Object.keys(REPORT_DATA), ...rows.map(r=>r.month)])].sort().reverse();
      sel.innerHTML = allMonths.map(m=>{
        const d = REPORT_DATA[m] || rows.find(r=>r.month===m);
        const label = d?.period_label || d?.period || m.replace('-','년 ')+'월';
        return `<option value="${m}" ${m===currentReportMonth?'selected':''}>${label}</option>`;
      }).join('');
    }

    // 트렌드 pill 새로고침
    const trendEl = document.querySelector('.monthly-grid');
    if(trendEl){
      trendEl.innerHTML = MONTHLY_TREND.map(t=>{
        const active = t.month===currentReportMonth;
        const rc = t.roas>=5?'color:var(--naver)':t.roas>=3?'color:var(--gold)':'color:var(--red)';
        return `<div class="month-pill ${active?'mp-active':''}" onclick="switchReportMonth('${t.month}')">
          <div class="mp-mo">${t.label}</div>
          <div class="mp-roas" style="${active?'':rc}">${t.roas.toFixed(1)}x</div>
        </div>`;
      }).join('');
    }
  }catch(e){
    console.warn('월별 트렌드 로드 실패:', e);
  }
}

function handleDrop(e){
  e.preventDefault();
  const dz=document.getElementById('dropZone');
  if(dz){dz.style.borderColor='var(--border2)';dz.style.background='var(--surface)';}
  addFilesToQueue(e.dataTransfer.files);
}
function handleFileSelect(input){addFilesToQueue(input.files);}

function addFilesToQueue(files){
  const today=new Date().toISOString().split('T')[0];
  Array.from(files).forEach(f=>{
    uploadedFiles.unshift({
      id:Date.now()+Math.random(),
      name:f.name, file:f, date:today,
      size:f.size>1048576?(f.size/1048576).toFixed(1)+' MB':(f.size/1024).toFixed(0)+' KB',
      status:'대기중'
    });
  });
  renderUploadTab();
  toast(`📎 ${files.length}개 파일 추가됨 — [전체 등록] 버튼을 눌러 저장하세요`);
}

function saveAllFiles() {
  const clientEl = document.getElementById('uploadClient');
  const client = currentUser.role === 'admin' ? (clientEl ? clientEl.value : '') : currentUser.id;
  if (!client) { toast('⚠️ 업체를 먼저 선택해주세요'); return; }
  const pending = uploadedFiles.filter(f => f.status === '대기중');
  if (!pending.length) { toast('⚠️ 대기중인 파일이 없습니다'); return; }
  toast(`💾 ${pending.length}개 파일 Supabase에 저장 시작...`);
  pending.forEach((f, i) => { setTimeout(() => saveOneFile(f, client), i * 500); });
}

function saveOneFile(fileObj, client) {
  const ext = fileObj.name.split('.').pop().toLowerCase();
  fileObj.status = '저장중';
  renderUploadTab();

  /* ── CSV ── */
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const text = e.target.result.replace(/^\uFEFF/, ''); // BOM 제거
        const lines = text.split(/\r?\n/);

        // ① 헤더 행 자동 탐색 (최대 10행 내에서)
        let headerIdx = -1, cols = [];
        const TARGET_COLS = ['일별','시간대별','검색어','키워드명','키워드'];
        for (let i = 0; i < Math.min(lines.length, 10); i++) {
          const c = csvParseLine(lines[i]);
          if (c.some(x => TARGET_COLS.includes(x.trim()))) {
            headerIdx = i; cols = c.map(x => x.trim()); break;
          }
        }
        if (headerIdx === -1) {
          fileObj.status = '저장실패'; renderUploadTab();
          toast(`⚠️ ${fileObj.name} — 헤더 인식 실패\n(일별/시간대별/검색어 컬럼이 없습니다)`);
          console.warn('CSV 헤더 탐색 실패. 첫 5행:', lines.slice(0,5));
          return;
        }

        // ② 날짜(월) 추출: 헤더 위쪽 행에서 날짜 패턴 검색
        let month = new Date().toISOString().slice(0, 7);
        for (let i = 0; i < headerIdx; i++) {
          const m1 = lines[i].match(/(\d{4})[\.\-](\d{2})[\.\-]\d{2}/);
          if (m1) { month = `${m1[1]}-${m1[2]}`; break; }
          const m2 = lines[i].match(/(\d{4})년\s*(\d{1,2})월/);
          if (m2) { month = `${m2[1]}-${m2[2].padStart(2,'0')}`; break; }
        }

        const hasDaily   = cols.includes('일별');
        const hasHourly  = cols.includes('시간대별');
        const hasKeyword = cols.some(c => ['검색어','키워드명','키워드'].includes(c));
        const kwCol      = cols.find(c => ['검색어','키워드명','키워드'].includes(c)) || '검색어';

        const rows = [];
        for (let i = headerIdx + 1; i < lines.length; i++) {
          const line = lines[i];
          if (!line.trim()) continue;
          const vals = csvParseLine(line);

                  rev:parseNum(r['전환매출액(원)']||r['전환매출액']||0)});

          const months = [...new Set(rows.map(r=>r.month))].join(', ');

function csvParseLine(line){
  const result=[];
  let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur.trim().replace(/^"|"$/g,''));cur='';}
    else{cur+=ch;}
  }
  result.push(cur.trim().replace(/^"|"$/g,''));
  return result;
}

function parseNum(v){
  if(v===''||v===null||v===undefined)return 0;
  if(typeof v==='number')return v;
  return parseFloat(String(v).replace(/[,원\s]/g,''))||0;
}

function parseExcelFile(idx){
  const f=uploadedFiles[idx];
  if(!f||!f.file){toast('⚠️ 파일을 다시 업로드해주세요');return;}
  toast('🔍 파싱 중...');
  loadSheetJS(()=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
        const rows=[];
        wb.SheetNames.forEach(sheetName=>{
          const ws=wb.Sheets[sheetName];
          const json=XLSX.utils.sheet_to_json(ws,{defval:''});
          if(!json.length)return;
          if(sheetName==='일별_누적'||f.type==='daily'){
            json.forEach(r=>{
              const date=r['일자\n(서식 셀)']||r['일자']||r['날짜']||'';
              const dateStr=date instanceof Date?date.toISOString().slice(0,10):String(date).slice(0,10);
              if(!dateStr||dateStr.length<8)return;
              rows.push({data_type:'daily',client_key:f.client,month:f.month,date:dateStr,
                campaign_type:String(r['캠페인유형']||r['유형']||''),
                device:String(r['PC/모바일']||r['기기']||''),
                media:String(r['매체']||''),
                imp:parseNum(r['노출수']),click:parseNum(r['클릭수']),
                cost:parseNum(r['총비용(VAT포함,원)']||r['총비용']||r['광고비']||0),
                conv:parseNum(r['전환수']),
                rev:parseNum(r['전환매출액(원)']||r['전환매출액']||r['전환매출']||0)});
            });
          } else if(sheetName.includes('키워드')||f.type==='keyword'){
            json.forEach(r=>{
              const kw=r['키워드명']||r['키워드']||'';
              if(!kw)return;
              rows.push({data_type:'keyword',client_key:f.client,month:f.month,keyword:String(kw),
                campaign_type:String(r['유형']||r['캠페인유형']||''),
                device:String(r['PC/모바일']||''),
                imp:parseNum(r['노출수']),click:parseNum(r['클릭수']),
                cost:parseNum(r['총비용\n(VAT포함,원)']||r['총비용']||r['광고비용']||0),
                avg_rank:parseNum(r['평균노출순위']||r['평균\n노출순위']||0),
                conv:parseNum(r['전환수']),
                rev:parseNum(r['전환매출액(원)']||r['전환매출액']||r['전환매출']||0)});
            });
          } else if(sheetName==='시간대'||f.type==='hourly'){
            json.forEach(r=>{
              const t=r['시간대별']||r['시간대']||'';
              if(!t)return;
              rows.push({data_type:'hourly',client_key:f.client,month:f.month,time_slot:String(t),
                campaign_type:String(r['캠페인유형']||''),device:String(r['PC/모바일']||''),
                imp:parseNum(r['노출수']),click:parseNum(r['클릭수']),
                cost:parseNum(r['총비용(VAT포함,원)']||r['총비용']||0),
                conv:parseNum(r['전환수']),
                rev:parseNum(r['전환매출액(원)']||r['전환매출액']||0)});
            });
          }
        });
        if(!rows.length){toast('⚠️ 인식된 데이터가 없습니다. 시트명을 확인해주세요');return;}
        uploadedFiles[idx].parsed=rows;
        uploadedFiles[idx].status='파싱완료';
        parsedTableData=parsedTableData.filter(r=>!(r.client_key===f.client&&r.month===f.month&&r.data_type===(rows[0]?.data_type)));
        parsedTableData.push(...rows);
        renderContent('input');
        setTimeout(renderUploadTab,50);
        toast(`✅ 파싱 완료! ${rows.length}개 행 인식됨`);
      }catch(err){console.error(err);toast('❌ 파싱 실패: '+err.message);}
    };
    reader.readAsBinaryString(f.file);
  });
}

async function saveToSupabase(idx){
  const f = uploadedFiles[idx];
  if(!f || !f.parsed || !f.parsed.length){
    toast('⚠️ 먼저 파싱을 완료해주세요');
    return;
  }

  toast(`🔍 [${f.month}] 중복 데이터 확인 및 저장 중...`);

  try {
    const headers = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    };

    // 1️⃣ 현재 DB에 저장된 해당 월의 데이터 목록을 가져옴 (중복 체크용)
    const checkRes = await fetch(
      `${SUPABASE_URL}/rest/v1/daily_reports?client_key=eq.${f.client}&month=eq.${f.month}&select=date,campaign_type,device`,
      { headers }
    );
    const existingData = await checkRes.json();

    // 2️⃣ 중복 데이터 필터링 함수
    // 날짜 + 캠페인 + 기기 조합이 DB에 없는 것만 골라냄
    const isNew = (item) => !existingData.some(old => 
      old.date === item.date && 
      old.campaign_type === item.campaign_type && 
      old.device === item.device
    );

    const dailyNew = f.parsed.filter(r => r.data_type === 'daily' && isNew(r));
    const keywordNew = f.parsed.filter(r => r.data_type === 'keyword'); // 키워드는 통상 전체 교체 권장
    const hourlyNew = f.parsed.filter(r => r.data_type === 'hourly');

    // 3️⃣ 새로운 데이터가 있을 때만 저장 진행
    if(dailyNew.length > 0){
      const res = await fetch(`${SUPABASE_URL}/rest/v1/daily_reports`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify(dailyNew)
      });
      if(!res.ok) throw new Error('데이터 저장 중 오류 발생');
      
      toast(`✅ 새 데이터 ${dailyNew.length}건 추가 완료!`);
    } else {
      toast('ℹ️ 추가할 새로운 데이터가 없습니다.');
    }

    // 4️⃣ 상태 업데이트
    uploadedFiles[idx].status = '저장완료';
    renderContent('input');
    setTimeout(renderUploadTab, 50);

  } catch(err) {
    console.error(err);
    toast('❌ 저장 실패: ' + err.message);
  }
}

async function saveAllParsed(){
  const idxs=uploadedFiles.map((f,i)=>f.status==='파싱완료'?i:-1).filter(i=>i>=0);
  if(!idxs.length){toast('⚠️ 파싱 완료된 파일이 없습니다');return;}
  for(const i of idxs)await saveToSupabase(i);
}

async function loadDataFromSupabase(){
  toast('🔄 불러오는 중...');
  const client=document.getElementById('filterClient2')?document.getElementById('filterClient2').value:'';
  const month=document.getElementById('filterMonth2')?document.getElementById('filterMonth2').value:'';
  const type=document.getElementById('filterType2')?document.getElementById('filterType2').value:'daily';
  const tableMap={daily:'daily_reports',keyword:'keyword_reports',hourly:'hourly_reports'};
  const table=tableMap[type]||'daily_reports';
  try{
    let url=`${SUPABASE_URL}/rest/v1/${table}?select=*&order=date.desc&limit=500`;
    if(client)url+=`&client_key=eq.${client}`;
    if(month)url+=`&month=eq.${month}`;
    const res=await fetch(url,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}});
    const rows=await res.json();
    if(!Array.isArray(rows))throw new Error(JSON.stringify(rows));
    rows.forEach(r=>r.data_type=type);
    parsedTableData=parsedTableData.filter(r=>r.data_type!==type);
    parsedTableData.push(...rows);
    renderDataTab();
    toast(`✅ ${rows.length}건 불러오기 완료`);
  }catch(err){toast('❌ 불러오기 실패: '+err.message);}
}

async function saveRowToSupabase(idx){
  const r=parsedTableData[idx];
  const tableMap={daily:'daily_reports',keyword:'keyword_reports',hourly:'hourly_reports'};
  const table=tableMap[r.data_type]||'daily_reports';
  try{
    const headers={'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Prefer':'resolution=merge-duplicates'};
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers,body:JSON.stringify([r])});
    if(!res.ok)throw new Error(await res.text());
    toast('✅ 저장 완료');
  }catch(err){toast('❌ 저장 실패: '+err.message);}
}

async function saveAllEdited(){
  toast('☁️ 전체 저장 중...');
  let ok=0,fail=0;
  for(let i=0;i<parsedTableData.length;i++){try{await saveRowToSupabase(i);ok++;}catch(e){fail++;}}
  toast(`✅ ${ok}건 저장${fail>0?' / ❌'+fail+'건 실패':''}`);
}

function exportCSV(){
  if(!parsedTableData.length){toast('⚠️ 데이터가 없습니다');return;}
  const keys=Object.keys(parsedTableData[0]);
  const csv=[keys.join(','),...parsedTableData.map(r=>keys.map(k=>JSON.stringify(r[k]??'')).join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('⬇ CSV 다운로드 완료');
}

let msgChannel = null;  // Realtime 채널
let currentChatClient = null;  // 현재 열린 채팅 클라이언트

/* ── 메시지 로드 ── */
async function loadMessages(clientKey){
  try{
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/messages?client_key=eq.${clientKey}&order=created_at.asc&limit=100`,
      {headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}}
    );
    const rows = await res.json();
    if(!Array.isArray(rows)) return;
    renderMessages(rows);

    // 읽음 처리 (상대방 메시지)
    const unreadIds = rows
      .filter(r=>r.sender_role!==currentUser.role && !r.is_read)
      .map(r=>r.id);
    if(unreadIds.length>0){
      await fetch(
        `${SUPABASE_URL}/rest/v1/messages?id=in.(${unreadIds.join(',')})`,
        {method:'PATCH',
         headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY},
         body:JSON.stringify({is_read:true})}
      );
    }
  }catch(e){console.warn('메시지 로드 실패:',e);}
}

/* ── 메시지 렌더 ── */
function renderMessages(rows){
  const chat = document.getElementById('chatArea');
  if(!chat) return;

  if(!rows.length){
    chat.innerHTML=`<div style="text-align:center;padding:30px;color:var(--text3)">
      <div style="font-size:24px;margin-bottom:8px">💬</div>
      <p style="font-size:13px">아직 대화 내용이 없습니다.<br>첫 메시지를 보내보세요!</p>
    </div>`;
    return;
  }

  chat.innerHTML = rows.map(r=>{
    const isMine = r.sender_id === currentUser.id;
    const time = new Date(r.created_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    const initials = r.sender_name?.charAt(0) || '?';
    return `<div class="brow ${isMine?'mine':''}">
      <div class="bav ${isMine?'bav-c':'bav-m'}">${initials}</div>
      <div>
        ${!isMine?`<div style="font-size:11px;color:var(--text3);margin-bottom:3px">${r.sender_name}</div>`:''}
        <div class="bubble ${isMine?'cli':'mgr'}">${r.content}</div>
        <div class="bmeta">${time}</div>
      </div>
    </div>`;
  }).join('');

  // 맨 아래로 스크롤
  chat.scrollTop = chat.scrollHeight;
}

/* ── 메시지 저장 ── */
async function saveMessage(clientKey, content){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/messages`,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPABASE_ANON_KEY,
        'Authorization':'Bearer '+SUPABASE_ANON_KEY,
        'Prefer':'return=representation'
      },
      body:JSON.stringify({
        client_key:  clientKey,
        sender_id:   currentUser.id,
        sender_name: currentUser.name || currentUser.company || currentUser.id,
        sender_role: currentUser.role,
        content:     content,
        is_read:     false
      })
    });
    return await res.json();
  }catch(e){
    console.warn('메시지 저장 실패:',e);
    return null;
  }
}

/* ── Realtime 구독 시작 ── */
function subscribeMessages(clientKey){
  // 기존 채널 해제
  if(msgChannel){
    try{ msgChannel.unsubscribe(); }catch(e){}
    msgChannel = null;
  }

  // Supabase Realtime WebSocket 연결
  const wsUrl = SUPABASE_URL.replace('https://','wss://') + '/realtime/v1/websocket?apikey=' + SUPABASE_ANON_KEY + '&vsn=1.0.0';

  try{
    const ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      // 채널 join
      ws.send(JSON.stringify({
        topic: `realtime:public:messages:client_key=eq.${clientKey}`,
        event: 'phx_join',
        payload: {config:{broadcast:{self:false},presence:{key:''},postgres_changes:[{event:'INSERT',schema:'public',table:'messages',filter:`client_key=eq.${clientKey}`}]}},
        ref: '1'
      }));
      console.log('✅ Realtime 연결됨');
    };
    ws.onmessage = (e) => {
      try{
        const msg = JSON.parse(e.data);
        if(msg.event === 'postgres_changes' || (msg.payload?.data?.type === 'INSERT')){
          const newRow = msg.payload?.data?.record || msg.payload?.record;
          if(newRow && newRow.sender_id !== currentUser.id){
            // 상대방 메시지 실시간 추가
            const chat = document.getElementById('chatArea');
            if(chat){
              const time = new Date(newRow.created_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
              const initials = newRow.sender_name?.charAt(0)||'?';
              chat.insertAdjacentHTML('beforeend',`
                <div class="brow">
                  <div class="bav bav-m">${initials}</div>
                  <div>
                    <div style="font-size:11px;color:var(--text3);margin-bottom:3px">${newRow.sender_name}</div>
                    <div class="bubble mgr">${newRow.content}</div>
                    <div class="bmeta">${time}</div>
                  </div>
                </div>`);
              chat.scrollTop = chat.scrollHeight;
              // 알림음 효과
              toast('💬 새 메시지: '+newRow.sender_name);
            }
          }
        }
      }catch(err){}
    };
    ws.onerror = ()=>{ console.warn('Realtime 연결 실패 — 폴링으로 전환'); startPolling(clientKey); };
    ws.onclose = ()=>{ console.log('Realtime 연결 종료'); };
    msgChannel = ws;
  }catch(e){
    startPolling(clientKey);
  }
}

/* ── Realtime 실패 시 폴링 fallback (5초마다) ── */
let pollingTimer = null;
function startPolling(clientKey){
  if(pollingTimer) clearInterval(pollingTimer);
  pollingTimer = setInterval(()=>{
    if(document.getElementById('chatArea')) loadMessages(clientKey);
    else { clearInterval(pollingTimer); pollingTimer=null; }
  }, 5000);
}
function stopPolling(){ if(pollingTimer){clearInterval(pollingTimer);pollingTimer=null;} }

}

async function openChat(clientKey, clientName){
  currentChatClient = clientKey;
  stopPolling();

  // 사이드바 활성화
  document.querySelectorAll('.msg-thread').forEach(t=>t.classList.remove('active'));
  const threads = document.querySelectorAll('.msg-thread');
  threads.forEach(t=>{ if(t.getAttribute('onclick')&&t.getAttribute('onclick').includes(clientKey)) t.classList.add('active'); });

  // 헤더 업데이트
  const titleEl = document.getElementById('chatTitle');
  const subEl   = document.getElementById('chatSub');
  if(titleEl) titleEl.textContent = clientName;
  if(subEl)   subEl.textContent   = '실시간 채팅';

function renderCal(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${months[calMonth]}`;
  const grid=document.getElementById('calGrid');
  if(!grid)return;
  const dows=['월','화','수','목','금','토','일'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1);
  let startDay=first.getDay()-1;if(startDay<0)startDay=6;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const today=new Date();
  const typeColor={meet:'var(--blue)',report:'var(--naver)',notice:'var(--gold)',task:'var(--indigo)'};
  const evMap={};
  calEvents.forEach(e=>{
    const[y,m,d]=e.date.split('-').map(Number);
    if(y===calYear&&m===calMonth+1){if(!evMap[d])evMap[d]=[];evMap[d].push(e.type);}
  });
  for(let i=startDay-1;i>=0;i--)html+=`<div class="cal-day other-month" style="pointer-events:none"><span>${prevDays-i}</span></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const dots=evMap[d]?evMap[d].map(t=>`<div class="ev-day-dot" style="background:${typeColor[t]||'var(--store)'}"></div>`).join(''):'';
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html+=`<div class="cal-day ${isToday?'today':''} ${evMap[d]?'has-event':''}" onclick="selectCalDay('${dateStr}',${d})">
      <span>${d}</span><div class="ev-dots">${dots}</div>
    </div>`;
  }
  const total=startDay+daysInMonth;
  const remain=total%7===0?0:7-(total%7);
  for(let i=1;i<=remain;i++)html+=`<div class="cal-day other-month" style="pointer-events:none"><span>${i}</span></div>`;
  grid.innerHTML=html;
  renderEvList(null);
}
function calMove(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();}

async function addEvent(){
  const dateStart = document.getElementById('ef-date-start').value;
  const dateEnd   = document.getElementById('ef-date-end').value || dateStart;
  const title     = document.getElementById('ef-title').value.trim();
  if(!dateStart||!title){toast('⚠️ 시작일과 제목을 입력해주세요');return;}
  if(dateEnd < dateStart){toast('⚠️ 종료일이 시작일보다 빠를 수 없습니다');return;}
  let cur = new Date(dateStart);
  const end = new Date(dateEnd);
  while(cur <= end){
    const dateStr = cur.toISOString().slice(0,10);
    const newEv = {
      id: Date.now()+Math.random(), date: dateStr, date_end: dateEnd,
      type:    document.getElementById('ef-type').value,
      title,
      desc:    document.getElementById('ef-desc').value,
      manager: document.getElementById('ef-mgr').value
    };
    calEvents.push(newEv);
    await saveEventToSupabase(newEv);
    cur.setDate(cur.getDate()+1);
  }
  closeModal();
  renderCal();
  const rangeText = dateStart===dateEnd ? dateStart : dateStart+' ~ '+dateEnd;
  toast('✅ 일정이 추가되었습니다! ('+rangeText+')');
}

function renderAdminTable(){
  const q = adminSearch.trim().toLowerCase();
  let list = ACCOUNTS.filter(a=>a.role==='client');
  if(q) list = list.filter(a=>a.company.toLowerCase().includes(q)||a.id.toLowerCase().includes(q));
  if(adminTeamFilter!=='전체') list = list.filter(a=>a.manager===adminTeamFilter);

  const total = list.length;
  const totalPages = Math.max(1, Math.ceil(total/adminPageSize));
  if(adminPage>totalPages) adminPage=totalPages;
  const paged = list.slice((adminPage-1)*adminPageSize, adminPage*adminPageSize);

  const wrap = document.getElementById('adminTableWrap');
  if(!wrap) return;

  if(!paged.length){
    wrap.innerHTML=`<div class="empty"><div class="ei">🔍</div><p>${total===0?'등록된 업체가 없습니다':'검색 결과가 없습니다'}</p></div>`;
    document.getElementById('adminPager').innerHTML='';
    return;
  }

  // 팀별 그룹핑
  const groups={};
  paged.forEach(c=>{
    const team = c.manager||'미지정';
    if(!groups[team]) groups[team]=[];
    groups[team].push(c);
  });

  let html='';
  let rowNum=(adminPage-1)*adminPageSize+1;
  Object.keys(groups).forEach(team=>{
    html+=`<div style="font-size:12px;font-weight:700;color:var(--blue);padding:10px 4px 4px;margin-top:8px">👤 ${team} 팀 (${groups[team].length}개)</div>`;
    html+=`<table class="cl-table"><thead><tr>
      <th style="width:40px">No</th>
      <th>업체명</th>
      <th>아이디</th>
      <th>스토어 URL</th>
      <th style="width:80px">상태</th>
      <th style="width:110px">관리</th>
    </tr></thead><tbody>`;
    groups[team].forEach(c=>{
      html+=`<tr class="${activeClientId===c.id?'sel-row':''}" onclick="selClient('${c.id}')" style="cursor:pointer">
        <td style="color:var(--text3);font-size:11px">${rowNum++}</td>
        <td><b>${c.company}</b></td>
        <td style="font-size:11.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${c.id}</td>
        <td style="font-size:11.5px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${c.url?`<a href="${c.url}" target="_blank" onclick="event.stopPropagation()" style="color:var(--blue);text-decoration:none">${c.url}</a>`:'—'}
        </td>
        <td><div style="display:flex;align-items:center;gap:4px"><div class="sdot"></div><span style="font-size:11px">운영중</span></div></td>
        <td><div class="act-btns">
          <button class="btn btn-ol btn-sm" onclick="event.stopPropagation();openEditClient('${c.id}')">✏️</button>
          <button class="btn btn-ol btn-sm" style="color:var(--red);border-color:rgba(239,68,68,.3)" onclick="event.stopPropagation();confirmDeleteClient('${c.id}')">🗑</button>
        </div></td>
      </tr>`;
    });
    html+=`</tbody></table>`;
  });
  wrap.innerHTML=html;

  // 페이지네이션
  const pager=document.getElementById('adminPager');
  if(totalPages<=1){pager.innerHTML='';return;}
  let pgHtml=`<span>총 ${total}개 업체 · ${adminPage}/${totalPages} 페이지</span><div class="pg-btns">`;
  pgHtml+=`<button class="pg-btn" onclick="adminPage=1;renderAdminTable()" ${adminPage===1?'disabled':''}>«</button>`;
  pgHtml+=`<button class="pg-btn" onclick="adminPage--;renderAdminTable()" ${adminPage===1?'disabled':''}>‹</button>`;
  for(let i=Math.max(1,adminPage-2);i<=Math.min(totalPages,adminPage+2);i++){
    pgHtml+=`<button class="pg-btn ${i===adminPage?'active':''}" onclick="adminPage=${i};renderAdminTable()">${i}</button>`;
  }
  pgHtml+=`<button class="pg-btn" onclick="adminPage++;renderAdminTable()" ${adminPage===totalPages?'disabled':''}>›</button>`;
  pgHtml+=`<button class="pg-btn" onclick="adminPage=${totalPages};renderAdminTable()" ${adminPage===totalPages?'disabled':''}>»</button>`;
  pgHtml+=`</div>`;
  pager.innerHTML=pgHtml;
}
function downloadClientList(){
  const list = ACCOUNTS.filter(a=>a.role==='client');
  if(!list.length){ toast('⚠️ 다운로드할 업체가 없습니다'); return; }
  const header = ['업체명','아이디','담당 매니저','스토어 URL'];
  const rows = list.map(c=>[c.company, c.id, c.manager||'미지정', c.url||'']);
  const csv = [header, ...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `업체목록_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('✅ 업체 목록 다운로드 완료');
}

async function saveEditClient(id){
  const c = ACCOUNTS.find(a => a.id === id);
  if(!c) return;

  const name  = document.getElementById('ec-name').value.trim();
  const newId = document.getElementById('ec-id').value.trim();
  const pw    = document.getElementById('ec-pw').value;
  const mgr   = document.getElementById('ec-mgr').value;
  const url   = document.getElementById('ec-url').value.trim();

  if(!name)  { toast('⚠️ 업체명을 입력해주세요'); return; }
 if(currentUser.role==='admin' && newId !== id && ACCOUNTS.find(a=>a.id===newId)){
    toast('⚠️ 이미 사용 중인 아이디입니다'); return;
  }

  toast('💾 저장 중...');

  try {
    const updateData = { company_name: name, manager: mgr, store_url: url };
    if(currentUser.role==='admin' && newId && newId !== id) updateData.client_key = newId;
    if(pw) updateData.password = pw;

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/clients?client_key=eq.${encodeURIComponent(id)}`,
      {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(updateData)
      }
    );

    if(!res.ok) {
      const err = await res.text();
      console.error('DB 에러:', err);
      throw new Error(err);
    }

    if(currentUser.role==='admin' && newId && newId !== id){
      c.id = newId;
      if(activeClientId === id) activeClientId = newId;
    }
    c.company = name;
    c.name    = name;
    c.manager = mgr;
    c.url     = url;
    if(pw) c.pw = pw;

    closeModal();
    toast(`✅ [${name}] 저장 완료`);
    if(typeof renderAdminTable === 'function') renderAdminTable();

  } catch(err) {
    console.error('저장 실패:', err);
    toast('❌ 저장 실패: ' + err.message);
  }
}

async function deleteClient(id){
  const idx=ACCOUNTS.findIndex(a=>a.id===id);
  if(idx===-1)return;
  const name=ACCOUNTS[idx].company;

  try{
    // Supabase 삭제
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/clients?client_key=eq.${id}`,
      {method:'DELETE',
       headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}}
    );
    if(!res.ok)throw new Error(await res.text());

    // 로컬 ACCOUNTS도 동기화
    ACCOUNTS.splice(idx,1);
    if(activeClientId===id)activeClientId=null;

    closeModal();
    toast(`🗑 ${name} 계정이 삭제되었습니다`);
    renderContent('admin');
  }catch(err){
    toast('❌ 삭제 실패: '+err.message);
  }
}

/* ════ 업체 엑셀 다운로드 ════ */
function downloadClientExcel(){
  loadSheetJS(()=>{
    const header = ['업체명','아이디(client_key)','비밀번호','담당매니저','스토어URL'];
    const data = [
  [...header, '※ 1행(이 줄)은 자동으로 건너뜁니다. 2행부터 업체 정보를 입력하세요.']
];

    const ws = XLSX.utils.aoa_to_sheet(data);
    // 컬럼 너비 설정
    ws['!cols'] = [{wch:20},{wch:20},{wch:15},{wch:12},{wch:40}];
    // 헤더 스타일
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '업체목록');
    XLSX.writeFile(wb, `디어컴퍼니_업체목록_${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('✅ 엑셀 다운로드 완료!');
  });
}

function handleBulkDrop(e){
  e.preventDefault();
  const dz = document.getElementById('bulkDropZone');
  if(dz){ dz.style.borderColor='var(--border2)'; dz.style.background='var(--surface)'; }
  const file = e.dataTransfer.files[0];
  if(file) previewBulkExcel(file);
}

let bulkData = [];
function previewBulkExcel(file){
  if(!file) return;
  loadSheetJS(()=>{
    const reader = new FileReader();
    reader.onload = e => {
      try{
        const wb = XLSX.read(e.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

        // 헤더 행 건너뛰고 데이터만 추출
        const dataRows = rows
  .slice(1) // 헤더 1행 건너뜀
  .filter(r => r[0] && r[1] && r[2]) // 업체명·아이디·비번 필수
  .filter(r => String(r[1]).trim() !== 'example-id'); // 예시 행 자동 제외 // 업체명·아이디·비번 필수
        if(!dataRows.length){
          document.getElementById('bulkPreview').innerHTML =
            `<div style="color:var(--red);font-size:12.5px;padding:10px">⚠️ 유효한 데이터가 없습니다. 업체명·아이디·비밀번호는 필수입니다.</div>`;
          return;
        }

        // 중복 체크
        bulkData = dataRows.map(r=>({
          company: String(r[0]||'').trim(),
          id:      String(r[1]||'').trim(),
          pw:      String(r[2]||'').trim(),
          manager: String(r[3]||'').trim(),
          url:     String(r[4]||'').trim(),
          dup:     !!ACCOUNTS.find(a=>a.id===String(r[1]||'').trim())
        })).filter(r=>r.company&&r.id&&r.pw);

        const newCount  = bulkData.filter(r=>!r.dup).length;
        const dupCount  = bulkData.filter(r=>r.dup).length;

        const previewHtml = `
          <div style="font-size:13px;font-weight:600;margin-bottom:8px">
            미리보기 — 총 ${bulkData.length}개
            <span style="color:var(--naver);font-size:12px;margin-left:8px">신규 ${newCount}개</span>
            ${dupCount>0?`<span style="color:var(--text3);font-size:12px;margin-left:6px">중복 ${dupCount}개 건너뜀</span>`:''}
          </div>
          <div style="overflow-x:auto;max-height:240px;overflow-y:auto">
            <table class="tbl">
              <thead><tr><th>업체명</th><th>아이디</th><th>담당매니저</th><th>URL</th><th>상태</th></tr></thead>
              <tbody>
                ${bulkData.map(r=>`<tr>
                  <td style="font-size:12.5px;font-weight:600">${r.company}</td>
                  <td style="font-size:11.5px;font-family:'IBM Plex Mono',monospace">${r.id}</td>
                  <td style="font-size:12px">${r.manager||'미지정'}</td>
                  <td style="font-size:11.5px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.url||'—'}</td>
                  <td>${r.dup
                    ? `<span style="font-size:11px;color:var(--text3);background:var(--surface);padding:2px 8px;border-radius:20px">중복 건너뜀</span>`
                    : `<span style="font-size:11px;color:var(--naver);background:var(--naver-l);padding:2px 8px;border-radius:20px;font-weight:600">신규 등록</span>`
                  }</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>`;

        document.getElementById('bulkPreview').innerHTML = previewHtml;
        const btn = document.getElementById('bulkRegisterBtn');
        if(btn) btn.style.display = newCount>0 ? 'inline-flex' : 'none';

      }catch(err){
        document.getElementById('bulkPreview').innerHTML =
          `<div style="color:var(--red);font-size:12.5px;padding:10px">❌ 파일 읽기 실패: ${err.message}</div>`;
      }
    };
    reader.readAsBinaryString(file);
  });
}

async function executeBulkRegister(){
  const toRegister = bulkData.filter(r=>!r.dup);
  if(!toRegister.length){ toast('⚠️ 등록할 신규 업체가 없습니다'); return; }

  const btn = document.getElementById('bulkRegisterBtn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ 등록 중...'; }

  let successCount = 0, failCount = 0;

  for(const c of toRegister){
    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/clients`,{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey':SUPABASE_ANON_KEY,
          'Authorization':'Bearer '+SUPABASE_ANON_KEY,
          'Prefer':'return=representation'
        },
        body:JSON.stringify({
          client_key:   c.id,
          password:     c.pw,
          company_name: c.company,
          manager:      c.manager,
          store_url:    c.url,
          is_active:    true
        })
      });
      if(!res.ok) throw new Error(await res.text());
      ACCOUNTS.push({id:c.id, pw:c.pw, role:'client', name:c.company, company:c.company, manager:c.manager, url:c.url});
      successCount++;
    }catch(err){
      console.error(`${c.company} 등록 실패:`, err);
      failCount++;
    }
  }

  closeModal();
  bulkData = [];

  if(failCount===0){
    toast(`✅ ${successCount}개 업체 일괄 등록 완료!`);
  } else {
    toast(`✅ ${successCount}개 등록 완료 / ❌ ${failCount}개 실패`);
  }
  renderContent('admin');
}
